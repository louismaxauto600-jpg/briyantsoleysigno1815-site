<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <title>Peman Ti Machann – BSS1815</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom, #ffa64d, #000);
      font-family: Arial, sans-serif;
      color: #ffa64d;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
      font-size: 36px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .payment-container {
      width: 90%;
      max-width: 500px;
      margin: 30px auto;
      background: #000;
      padding: 25px;
      border-radius: 12px;
      border: 2px solid #ffa64d;
      text-align: left;
    }

    label {
      font-size: 18px;
      display: block;
      margin-top: 15px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      border-radius: 6px;
      border: 2px solid #ffa64d;
      background: #111;
      color: #ffa64d;
      font-size: 16px;
    }

    .info-box {
      margin-bottom: 18px;
      font-size: 20px;
      line-height: 28px;
    }

    .label {
      font-weight: bold;
      color: #ffb76b;
    }

    .btn {
      width: 100%;
      padding: 15px;
      margin-top: 25px;
      background: #ffa64d;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 20px;
      cursor: pointer;
      transition: 0.3s;
      text-transform: uppercase;
      font-weight: bold;
    }

    .btn:hover {
      transform: scale(1.05);
      background: #ffb76b;
    }

  </style>
</head>

<body>

  <h1>Peman Ti Machann</h1>

  <div class="payment-container">

    <div class="info-box">
      <span class="label">ID Machann:</span> <span id="vendorID"></span>
    </div>

    <div class="info-box">
      <span class="label">Non:</span> <span id="vendorName"></span>
    </div>

    <div class="info-box">
      <span class="label">Montan Total:</span> $<span id="vendorAmount"></span>
    </div>

    <div class="info-box">
      <span class="label">Montan Ki Deja Peye:</span> $<span id="vendorPaid"></span>
    </div>

    <div class="info-box">
      <span class="label">Rès Pou Peye:</span> $<span id="vendorRemaining"></span>
    </div>

    <label>Montan K ap Peye Kounye a</label>
    <input type="number" id="paymentAmount">

    <label>Mwayen Peman</label>
    <select id="paymentMethod">
      <option>Cash</option>
      <option>Zelle</option>
      <option>CashApp</option>
      <option>POS</option>
    </select>

    <button class="btn" onclick="confirmPayment()">Konfime Peman</button>

  </div>

  <script>
    // Egzanp done (ranplase ak backend ou)
    const vendor = {
      id: "TM-2026-002",
      name: "Marie Ti Bwason",
      amount: 200,
      paid: 150
    };

    function loadPaymentData() {
      document.getElementById("vendorID").innerText = vendor.id;
      document.getElementById("vendorName").innerText = vendor.name;
      document.getElementById("vendorAmount").innerText = vendor.amount;
      document.getElementById("vendorPaid").innerText = vendor.paid;
      document.getElementById("vendorRemaining").innerText = vendor.amount - vendor.paid;
    }

    function confirmPayment() {
      const pay = Number(document.getElementById("paymentAmount").value);

      if (pay <= 0) {
        alert("Montan pa valab");
        return;
      }

      alert("Peman an konfime avèk siksè!");
      window.location.href = "ti-machann-profile.html?id=" + vendor.id;
    }

    loadPaymentData();
  </script>

</body>
</html>
