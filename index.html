<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "PASTE_API_KEY_HERE",
    authDomain: "PASTE_AUTH_DOMAIN_HERE",
    projectId: "PASTE_PROJECT_ID_HERE",
    storageBucket: "PASTE_STORAGE_BUCKET_HERE",
    messagingSenderId: "PASTE_MESSAGING_SENDER_ID_HERE",
    appId: "PASTE_APP_ID_HERE"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      console.log("Pa gen user konekte");
      return;
    }

    console.log("User UID:", user.uid);

    try {
      // 🔥 SISTÈM SUPERADMIN OFISYÈL BSS 1815
      const adminRef = doc(db, "MAXIMAX", "MAXIMAX_ADMIN");
      const adminSnap = await getDoc(adminRef);

      if (adminSnap.exists()) {
        const adminData = adminSnap.data();
        console.log("Admin data:", adminData);

        // 🔥 VERIFY UID + ROLE
        if (
          adminData.uid === user.uid &&
          adminData.role === "SUPER_ADMIN"
        ) {
          document.getElementById("admin-badge").style.display = "block";
          console.log("SUPER ADMIN OK");
        } else {
          console.log("User pa SUPERADMIN");
        }
      } else {
        console.log("Dokiman MAXIMAX_ADMIN pa egziste");
      }
    } catch (error) {
      console.error("Firestore error:", error);
    }
  });
</script>
