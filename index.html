<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSS1815</title>

<style>
body{
margin:0;
font-family:Arial;
background:black;
color:white;
text-align:center;
}

/* LOGO */
.logo{
margin:20px;
}
.logo img{
width:200px;
}

/* FRAME */
.frame{
width:90%;
max-width:500px;
margin:auto;
height:400px;
position:relative;
overflow:hidden;
border:2px solid orange;
border-radius:10px;
}

/* KOUKOU */
.koukou{
position:absolute;
width:100%;
height:100%;
transition:1s;
}

.koukou img{
width:100%;
height:100%;
object-fit:cover;
animation:move 1s infinite;
}

/* LOOK AROUND */
@keyframes move{
0%{transform:rotate(0);}
25%{transform:rotate(-6deg);}
50%{transform:rotate(6deg);}
75%{transform:rotate(-4deg);}
100%{transform:rotate(0);}
}

/* SLIDESHOW */
.slide{
position:absolute;
width:100%;
height:100%;
display:none;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}
</style>
</head>

<body>

<div class="logo">
<img src="assets/bss-logo-ofisyèl.jpeg">
</div>

<div class="frame">

<div class="koukou" id="koukou">
<img src="assets/leaders/koukou-fly.jpeg">
</div>

<div class="slide" id="slide">
<img id="img">
</div>

</div>

<script>
const images = [
"cange.jpeg",
"bawon-an.jpeg",
"mambo_fifi.jpeg",
"jeff-colin.jpeg"
];

let i=0;

function slideshow(){
document.getElementById("img").src="assets/leaders/"+images[i];
i=(i+1)%images.length;
}

setTimeout(()=>{
document.getElementById("koukou").style.transform="translateX(-100%)";

setTimeout(()=>{
document.getElementById("koukou").style.display="none";
document.getElementById("slide").style.display="block";

slideshow();
setInterval(slideshow,3000);

},1000);

},10000);
</script>

</body>
</html>
