<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8" />
  <title>PRO-MAX FINAL</title>

  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: system-ui, sans-serif;
    }

    /* LOGO */
    #logo-wrapper {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
      z-index: 5;
    }

    #logo-wrapper img {
      max-width: 220px;
      filter: drop-shadow(0 0 18px #ff7a00);
    }

    /* KOUKOU ANIMASYON */
    #koukou {
      position: absolute;
      left: -400px;
      top: 50%;
      transform: translateY(-50%);
      animation: flyIn 1.5s ease-out forwards,
                 stay 1.2s ease-out 1.5s forwards,
                 flyOut 1.5s ease-in 2.7s forwards;
      z-index: 10;
    }

    @keyframes flyIn {
      from { left: -400px; opacity: 0; }
      to   { left: 50%; opacity: 1; transform: translate(-50%, -50%); }
    }

    @keyframes stay {
      from { opacity: 1; }
      to   { opacity: 1; }
    }

    @keyframes flyOut {
      from { left: 50%; opacity: 1; transform: translate(-50%, -50%); }
      to   { left: 120%; opacity: 0; }
    }

    /* SLIDESHOW */
    #slideshow {
      display: none;
      z-index: 1;
    }

    #slideshow img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border: 4px solid #ff7a00;
      box-shadow: 0 0 25px #ff7a00;
    }
  </style>
</head>

<body>

  <!-- LOGO -->
  <div id="logo-wrapper">
    <img src="bss-logo-ofisyel.jpeg">
  </div>

  <!-- KOUKOU -->
  <img id="koukou" src="koukou-fly.png">
