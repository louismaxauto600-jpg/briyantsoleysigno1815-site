<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8" />
  <title>BSS1815 – Ofisyèl</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #ff7a00 0%, #000000 55%, #000000 100%);
      color: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page-wrapper {
      width: 100%;
      max-width: 480px;
      padding: 20px 16px;
    }

    .card {
      background: rgba(0, 0, 0, 0.9);
      border-radius: 18px;
      border: 1px solid rgba(255, 122, 0, 0.5);
      padding: 22px 18px 26px;
      box-shadow: 0 0 28px rgba(0, 0, 0, 0.9);
      text-align: center;
    }

    .brand-title {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #ff7a00;
      margin-bottom: 6px;
    }

    .main-title {
      font-size: 1.1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: #f5f5f5;
      margin-bottom: 18px;
    }

    .btn-block {
      width: 100%;
      margin: 8px 0;
    }

    .btn {
      width: 100%;
      padding: 12px 18px;
      border-radius: 999px;
      border: 2px solid #ff7a00;
      background: transparent;
      color: #ff7a00;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.18s ease-out;
    }

    .btn:hover {
      background: #ff7a00;
      color: #000000;
    }

    .btn-label {
      font-size: 0.8rem;
    }

    @media (min-width: 768px) {
      .page-wrapper {
        max-width: 520px;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div class="card">
      <div class="brand-title">BSS1815 OFISYÈL</div>
      <div class="main-title">SEKSYON PRINSIPAL</div>

      <!-- BOUTON 1 -->
      <div class="btn-block">
        <button class="btn" id="btn-rjra">
          <span class="btn-label">RJRA_BSS815</span>
        </button>
      </div>

      <!-- BOUTON 2 -->
      <div class="btn-block">
        <button class="btn" id="btn-mask">
          <span class="btn-label">Sebagai Mask</span>
        </button>
      </div>

      <!-- BOUTON 3 -->
      <div class="btn-block">
        <button class="btn" id="btn-admin">
          <span class="btn-label">Area man Admin</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    // Si pita ou vle louvri lòt paj:
    // document.getElementById('btn-admin').onclick = () => {
    //   window.location.href = 'admin.html';
    // };
  </script>
</body>
</html>
