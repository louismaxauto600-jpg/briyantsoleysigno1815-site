<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSS1815 — PRO‑MAX</title>

    <style>
        /* ============================
           PALET KOULÈ OFISYÈL BSS1815
           ============================ */
        :root {
            --abriko: #FF7A00;
            --jòn: #FFD400;
            --nwa: #000000;
            --nwa-soft: #1A1A1A;
            --blan: #FFFFFF;
        }

        body {
            margin: 0;
            background: var(--nwa);
            color: var(--blan);
            font-family: Arial, sans-serif;
        }

        /* ============================
           HEADER + LOGO PRO‑MAX
           ============================ */
        .bss-header {
            background: var(--nwa);
            padding: 15px 30px;
            border-bottom: 2px solid var(--abriko);
        }

        .bss-header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .bss-logo {
            width: 260px;
            height: auto;
            filter: drop-shadow(0 0 10px var(--abriko));
        }

        /* ============================
           KOUKOU ANIMASYON PRO‑MAX
           ============================ */
        #koukou-container {
            position: absolute;
            top: 120px;
            right: -300px;
            z-index: 9999;
        }

        #koukou {
            width: 180px;
            animation: flyIn 1.5s ease-out forwards,
                       stay 5s ease-in forwards 1.5s,
                       flyOut 1.5s ease-in forwards 6.5s;
        }

        @keyframes flyIn {
            from { transform: translateX(300px); opacity: 0; }
            to   { transform: translateX(0); opacity: 1; }
        }

        @keyframes stay {
            from { opacity: 1; }
            to   { opacity: 1; }
        }

        @keyframes flyOut {
            from { transform: translateX(0); opacity: 1; }
            to   { transform: translateX(-400px); opacity: 0; }
        }

        /* ============================
           SLIDESHOW PRO‑MAX
           ============================ */
        #slideshow {
            width: 100%;
            height: 450px;
            overflow: hidden;
            position: relative;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            margin-top: 200px;
        }

        #slideshow img {
            width: 100%;
            height: 450px;
            object-fit: cover;
            position: absolute;
            animation: fadeSlide 12s infinite;
        }

        @keyframes fadeSlide {
            0%   { opacity: 0; transform: scale(1); }
            10%  { opacity: 1; transform: scale(1.05); }
            40%  { opacity: 1; transform: scale(1.1); }
            50%  { opacity: 0; transform: scale(1.1); }
            100% { opacity: 0; transform: scale(1); }
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <!-- HEADER + LOGO -->
    <header class="bss-header">
        <div class="bss-header-inner">
            <img src="/PATH/logo-bss2.jpeg" class="bss-logo">
        </div>
    </header>

    <!-- KOUKOU ANIMASYON -->
    <div id="koukou-container">
        <img id="koukou" src="/PATH/koukou.jpeg">
    </div>

    <!-- SLIDESHOW -->
    <div id="slideshow" class="hidden">
        <img src="/PATH/slide1.jpeg">
        <img src="/PATH/slide2.jpeg">
        <img src="/PATH/slide3.jpeg">
    </div>

    <script>
        // Apre 8 segonn → slideshow parèt
        setTimeout(() => {
            document.getElementById("slideshow").classList.remove("hidden");
            document.getElementById("slideshow").style.opacity = "1";
        }, 8000);
    </script>

</body>
</html>
