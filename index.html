<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BRIYANTSOLEYSIGNO 1815</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        /* NAVBAR */
        .navbar {
            width: 100%;
            height: 70px;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            position: fixed;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid #ff7b00;
        }

        .navbar img {
            height: 55px;
        }

        .menu {
            display: flex;
            gap: 25px;
        }

        .menu a {
            color: #ff7b00;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
        }

        /* KOUKOU BLOCK */
        #koukou {
            position: absolute;
            top: 120px;
            right: -500px;
            width: 420px;
            transition: all 1.2s ease-in-out;
        }

        /* SLIDESHOW */
        .slideshow-container {
            width: 100%;
            height: 100vh;
            margin-top: 120px;
            display: none;
            position: relative;
        }

        .slide {
            width: 100%;
            height: 100%;
            position: absolute;
            display: none;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.88;
        }

        .caption {
            position: absolute;
            bottom: 40px;
            left: 40px;
            color: #fff;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 8px #000;
            max-width: 60%;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <img src="assets/logo/bss1815-logo.png" alt="BRIYANTSOLEYSIGNO 1815" />
        <div class="menu">
            <a href="#">HOME</a>
            <a href="#">KIYÈS NOU YE</a>
            <a href="#">MIZIK</a>
            <a href="#">RARA</a>
            <a href="#">ADMIN</a>
            <a href="#">UPLOAD FOTO</a>
        </div>
    </div>

    <!-- KOUKOU FLY-IN -->
    <img id="koukou" src="assets/leaders/koukou-fly.jpeg" alt="KOUKOU" />

    <!-- SLIDESHOW TEMWAYAJ -->
    <div class="slideshow-container" id="slideshow">
        <div class="slide">
            <img src="assets/temwayaj/1.jpeg" />
            <div class="caption">Temwayaj 1</div>
        </div>

        <div class="slide">
            <img src="assets/temwayaj/2.jpeg" />
            <div class="caption">Temwayaj 2</div>
        </div>

        <div class="slide">
            <img src="assets/temwayaj/3.jpeg" />
            <div class="caption">Temwayaj 3</div>
        </div>
    </div>

    <script>
        // KOUKOU FLY-IN
        const koukou = document.getElementById("koukou");
        const slideshow = document.getElementById("slideshow");

        setTimeout(() => {
            koukou.style.right = "40px"; // fly-in
        }, 500);

        setTimeout(() => {
            koukou.style.right = "-500px"; // fly-out
        }, 10500);

        setTimeout(() => {
            slideshow.style.display = "block";
            startSlideshow();
        }, 12500);

        // SLIDESHOW
        let slideIndex = 0;
        function startSlideshow() {
            const slides = document.getElementsByClassName("slide");
            for (let i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }
            slideIndex++;
            if (slideIndex > slides.length) {
                slideIndex = 1;
            }
            slides[slideIndex - 1].style.display = "block";
            setTimeout(startSlideshow, 10000);
        }
    </script>

</body>
</html>
