<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSS1815 OFFICIAL</title>

<style>
body{margin:0;background:#000;color:#ff7a00;font-family:Arial}
header{display:flex;justify-content:space-between;align-items:center;padding:15px;background:#111;border-bottom:2px solid #ff7a00}
header img{width:60px;border-radius:50%;border:2px solid #ff7a00}
nav a{color:#ff7a00;margin-left:15px;text-decoration:none;font-weight:bold}

#slideshow{height:420px;position:relative;overflow:hidden}
.slide{position:absolute;width:100%;height:100%;opacity:0;transition:.8s}
.slide img{width:100%;height:100%;object-fit:cover}
.slide.active{opacity:1}

.section{padding:40px;text-align:center}
.card{border:1px solid #ff7a00;padding:20px;margin:10px;border-radius:12px}

input{display:block;margin:10px auto;padding:10px;width:250px;background:#000;border:1px solid #ff7a00;color:#ff7a00}
button{padding:10px 20px;background:#ff7a00;color:#000;border:none}
</style>
</head>

<body>

<header>
  <div style="display:flex;align-items:center;gap:10px">
    <img src="bss-logo-ofisyel.jpeg">
    <div>BSS 1815</div>
  </div>
  <nav>
    <a href="#">Home</a>
    <a href="#gallery">Gallery</a>
    <a href="#store">Store</a>
    <a href="#admin">Admin</a>
  </nav>
</header>

<!-- SLIDESHOW -->
<div id="slideshow"></div>

<!-- GALERI -->
<div id="gallery" class="section"></div>

<!-- STORE -->
<div id="store" class="section">
<h2>BSS STORE</h2>
<div class="card">T-Shirt $25</div>
<div class="card">Hoodie $30</div>
</div>

<!-- ADMIN LOGIN -->
<div id="admin" class="section">

<h2>ADMIN LOGIN</h2>

<div id="loginBox">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">LOGIN</button>
<p id="msg"></p>
</div>

<div id="panel" style="display:none">
<h3>WELCOME ADMIN</h3>
<button onclick="logout()">LOGOUT</button>
</div>

</div>

<script>

// IMAGES
const photos = [
"bawon-an.jpeg","cange.jpeg","miami-an-aksyon.jpeg",
"adan-signo.jpeg","andy.jpeg","fanfan.jpg","roro-lajan.jpeg"
];

// BUILD SLIDESHOW
const slideBox = document.getElementById("slideshow");
photos.forEach(p=>{
let d=document.createElement("div");
d.className="slide";
d.innerHTML=`<img src="${p}">`;
slideBox.appendChild(d);
});

let slides=document.querySelectorAll(".slide");
let i=0;
slides[0].classList.add("active");

setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},4000);

// GALERI
const gallery=document.getElementById("gallery");
photos.forEach(p=>{
let img=document.createElement("img");
img.src=p;
img.style.width="120px";
img.style.margin="5px";
gallery.appendChild(img);
});

// LOGIN SYSTEM
function login(){
let email=document.getElementById("email").value;
let pass=document.getElementById("pass").value;

if(email==="admin@bss1815.com" && pass==="BSS2025"){
document.getElementById("loginBox").style.display="none";
document.getElementById("panel").style.display="block";
}else{
document.getElementById("msg").innerText="Wrong login";
}
}

function logout(){
document.getElementById("loginBox").style.display="block";
document.getElementById("panel").style.display="none";
}

</script>

</body>
</html>
