<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSS 1815</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
background:#000;
color:#ff7a00;
font-family:Arial,sans-serif;
overflow-x:hidden;
}

/* TOPBAR */
.topbar{
position:fixed;
top:0;left:0;width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 16px;
background:#000;
border-bottom:1px solid #ff7a00;
z-index:999;
}

.brand{display:flex;align-items:center;gap:10px}
.brand img{width:60px;height:60px;border-radius:50%}
.brand span{font-size:13px;font-weight:bold}

.nav{display:flex;gap:8px;align-items:center}
.nav button{
padding:7px 12px;
background:#000;
color:#ff7a00;
border:1px solid #ff7a00;
border-radius:20px;
cursor:pointer;
}

/* LANGUAGE */
.lang{
display:flex;
gap:5px;
margin-left:10px;
}
.lang button{
font-size:11px;
padding:5px 8px;
}

/* OWL INTRO */
#introOverlay{
position:fixed;
inset:0;
background:#000;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 8%;
z-index:9999;
}

.intro-logo{width:110px}

.intro-owl-wrap{
transform:translateX(120vw);
animation:owlIn 2s forwards;
}

.intro-owl{
width:170px;
animation:wing .6s infinite;
}

@keyframes owlIn{to{transform:translateX(0)}}
@keyframes owlOut{to{transform:translateX(120vw);opacity:0}}
@keyframes wing{50%{transform:scaleY(.9)}}

.fadeOut{animation:fade 1s forwards}
@keyframes fade{to{opacity:0;visibility:hidden}}

/* HERO */
.hero{
margin-top:70px;
height:80vh;
position:relative;
overflow:hidden;
}

.slide{
position:absolute;
inset:0;
opacity:0;
transition:1s;
}

.slide.active{opacity:1}

.slide img{
width:100%;
height:100%;
object-fit:contain;
object-position:center;
filter:brightness(.85);
background:#000;
}

/* TESTIMONY */
.caption{
position:absolute;
bottom:20px;
left:20px;
right:20px;
background:#000;
border:1px solid #ff7a00;
padding:10px;
font-size:13px;
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
padding:20px;
}

.gallery img{
width:100%;
height:200px;
object-fit:cover;
object-position:top center;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="introOverlay">
<img src="bss-logo-ofisyel.jpeg" class="intro-logo">
<div class="intro-owl-wrap" id="owlWrap">
<img src="owl-fly.jpeg" class="intro-owl">
</div>
</div>

<header class="topbar">
<div class="brand">
<img src="bss-logo-ofisyel.jpeg">
<span>BSS 1815</span>
</div>

<div class="nav">
<button onclick="showHome()">HOME</button>
<button onclick="showGallery()">GALERI</button>

<div class="lang">
<button>KRE</button>
<button>ENG</button>
<button>ESP</button>
</div>
</div>
</header>

<div id="homePage">
<div class="hero" id="slides"></div>
</div>

<div id="galleryPage" style="display:none">
<div class="gallery" id="gallery"></div>
</div>

<script>
const images=[
"only-u.jpeg","ange.jpeg","adan-signo.jpeg","andy.jpeg","badin.jpeg","blackson.jpeg",
"nadia-lafortune.jpg","macu1.jpg","pdg-ti-fre.jpg","mambo-fifi.jpg","roro-lajan.jpg",
"jeff-colin.jpg","fannfan.jpg","anpere-ti-rat.jpg","mario.jpg","perodin.jpg",
"cange1.jpg","maximax1.jpg","nadege.jpg","sinndy.jpg","may.jpg","asmide.jpg",
"andre-asouman.jpg","one-love.jpg","slogan.jpg","sonsonn1.jpg","ygens.jpg"
];

/* TESTIMONY DEFAULT */
const text="BSS 1815 se yon fòs, yon vizyon, yon limyè ki pap janm etenn.";

const slides=document.getElementById("slides");
const gallery=document.getElementById("gallery");

images.forEach(img=>{
let s=document.createElement("div");
s.className="slide";
s.innerHTML=`
<img src="${img}">
<div class="caption">${text}</div>
`;
slides.appendChild(s);

let g=document.createElement("img");
g.src=img;
gallery.appendChild(g);
});

let allSlides=document.querySelectorAll(".slide");
let i=0;

function showSlide(){
allSlides.forEach(s=>s.classList.remove("active"));
allSlides[i].classList.add("active");
i=(i+1)%allSlides.length;
}

function start(){
showSlide();
setInterval(showSlide,6000);
}

/* OWL FLOW */
setTimeout(()=>{owlWrap.style.animation="owlOut 2s forwards"},6000);
setTimeout(()=>{
introOverlay.classList.add("fadeOut");
start();
},8000);

/* NAV */
function showHome(){
document.getElementById("homePage").style.display="block";
document.getElementById("galleryPage").style.display="none";
}

function showGallery(){
document.getElementById("homePage").style.display="none";
document.getElementById("galleryPage").style.display="block";
introOverlay.style.display="none";
}
</script>

</body>
</html>
