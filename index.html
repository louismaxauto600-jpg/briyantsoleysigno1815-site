<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BSS1815 – Briyant Solèy Signo 1815</title>

  <style>
    /* HEADER BSS1815 */
    .bss-header {
      width: 100%;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to right, #000000, #ff9b3b, #000000);
      border-bottom: 2px solid #ff9b3b;
    }

    /* LOGO GAUCHE + KOUKOU DWAT */
    .bss-left-logo,
    .bss-right-koukou {
      width: 120px;
      height: auto;
      filter: none; /* PA NEGATIF */
    }

    /* TIT NAN MITAN – KORÈKSYON KÒLÈ */
    .bss-title {
      flex: 1;
      text-align: center;
      font-size: 26px;
      font-weight: 900;
      color: #000000; /* NWA POU KONTRAS */
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* ANIMASYON LOGO */
    @keyframes logoRotateIn {
      0% {
        transform: rotate(-180deg) scale(0.3);
        opacity: 0;
      }
      100% {
        transform: rotate(0deg) scale(1);
        opacity: 1;
      }
    }

    .bss-left-logo {
      animation: logoRotateIn 1.2s ease-out forwards;
    }

    /* ANIMASYON KOUKOU */
    @keyframes koukouFlyIn {
      0% {
        transform: translateX(120px);
        opacity: 0;
      }
      100% {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .bss-right-koukou {
      animation: koukouFlyIn 1.1s ease-out forwards;
    }

    /* STYLE KONTNI */
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .section {
      padding: 40px 20px;
    }

    .btn {
      background: #ff9b3b;
      color: #000;
      padding: 14px 22px;
      border-radius: 6px;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
      margin: 10px;
    }
  </style>
</head>

<body>

  <!-- HEADER BSS1815 -->
  <header class="bss-header">
    <img src="nouvo-logo-bss-3.jpeg" class="bss-left-logo" alt="BSS1815 Logo">
    <h1 class="bss-title">BRIYANT SOLÈY SIGNO 1815</h1>
    <img src="koukou4.jpeg" class="bss-right-koukou" alt="Koukou BSS1815">
  </header>

  <!-- SEKSYON AK BOUTON -->
  <div class="section">
    <a href="admin.html" class="btn">Antre nan Admin</a>
    <a href="kiyesnouye.html" class="btn">Kiyès nou ye</a>
    <a href="mizik.html" class="btn">Mizik</a>
  </div>

  <!-- SEKSYON DESKRIPSYON -->
  <div class="section">
    <h2>Kiyès nou ye</h2>
    <p>BSS1815 se yon ekip disipline, fyète, ak idantite.</p>
  </div>

</body>
</html>
