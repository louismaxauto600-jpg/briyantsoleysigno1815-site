<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BSS1815 – Briyant Solèy Signo 1815</title>

  <style>
    /* STYLE GLOBAL */
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #000000;
      color: #ffffff;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    /* HEADER BSS1815 */
    .bss-header {
      width: 100%;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to right, #000000, #ff9b3b, #000000);
      border-bottom: 2px solid #ff9b3b;
    }

    /* LOGO GAUCHE + KOUKOU DWAT – GWO, VIZIB, PA NEGATIF */
    .bss-left-logo,
    .bss-right-koukou {
      width: 260px;      /* GWO, VIZIB, KLÈ */
      height: auto;
      filter: none;      /* PA NEGATIF */
    }

    /* TIT NAN MITAN – NWA POU PA FÈ JÒN SOU JÒN */
    .bss-title {
      flex: 1;
      text-align: center;
      font-size: 28px;
      font-weight: 900;
      color: #000000; /* NWA POU KONTRAS SOU FON ABRIKO */
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 4px rgba(0,0,0,0.6);
    }

    /* ANIMASYON LOGO */
    @keyframes logoRotateIn {
      0% {
        transform: rotate(-180deg) scale(0.3);
        opacity: 0;
      }
      100% {
        transform: rotate(0deg) scale(1);
        opacity: 1;
      }
    }

    .bss-left-logo {
      animation: logoRotateIn 1.2s ease-out forwards;
    }

    /* ANIMASYON KOUKOU */
    @keyframes koukouFlyIn {
      0% {
        transform: translateX(140px);
        opacity: 0;
      }
      100% {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .bss-right-koukou {
      animation: koukouFlyIn 1.1s ease-out forwards;
    }

    /* SEKSYON KONTNI */
    .section {
      padding: 40px 20px;
    }

    .section h2 {
      color: #ff9b3b;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .section p {
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.5;
      color: #f0f0f0;
    }

    /* BOUTON */
    .btn {
      background: #ff9b3b;
      color: #000000;
      padding: 14px 24px;
      border-radius: 6px;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
      margin: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: 2px solid #000000;
      box-shadow: 0 0 10px rgba(0,0,0,0.6);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 16px rgba(255,155,59,0.9);
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .bss-left-logo,
      .bss-right-koukou {
        width: 200px;
      }

      .bss-title {
        font-size: 22px;
      }

      .section {
        padding: 30px 16px;
      }
    }

    @media (max-width: 480px) {
      .bss-header {
        flex-direction: column;
        gap: 8px;
      }

      .bss-left-logo,
      .bss-right-koukou {
        width: 180px;
      }

      .bss-title {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER BSS1815 -->
  <header class="bss-header">
    <img src="nouvo-logo-bss-3.jpeg" class="bss-left-logo" alt="BSS1815 Logo">
    <h1 class="bss-title">BRIYANT SOLÈY SIGNO 1815</h1>
    <img src="koukou4.jpeg" class="bss-right-koukou" alt="Koukou BSS1815">
  </header>

  <!-- SEKSYON AK BOUTON -->
  <div class="section">
    <a href="admin.html" class="btn">Antre nan Admin</a>
    <a href="kiyesnouye.html" class="btn">Kiyès nou ye</a>
    <a href="mizik.html" class="btn">Mizik</a>
  </div>

  <!-- SEKSYON DESKRIPSYON -->
  <div class="section">
    <h2>Kiyès nou ye</h2>
    <p>
      BSS1815 se yon ekip disipline, fyète, ak idantite.  
      Chak paj, chak logo, chak koulè se yon deklarasyon prezans nou.
    </p>
  </div>

</body>
</html>
