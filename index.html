<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <title>BSS 1815 – Sit Ofisyèl</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom, #ffa64d, #000);
      color: #ffa64d;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow-x: hidden;
    }

    .header-area {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 40px;
    }

    /* LOGO A GÒCH — ROTATE IN */
    .logo {
      width: 140px;
      opacity: 0;
      transform: rotate(-180deg) scale(0.3);
      animation: spinIn 1.6s ease-out forwards;
    }

    @keyframes spinIn {
      0% {
        opacity: 0;
        transform: rotate(-180deg) scale(0.3);
      }
      70% {
        opacity: 1;
        transform: rotate(10deg) scale(1.1);
      }
      100% {
        transform: rotate(0deg) scale(1);
      }
    }

    /* KOUKOU A DWAT — FLY-IN → PAUSE 4s → FLY-OUT */
    .koukou {
      width: 140px;
      opacity: 0;
      animation: 
        flyIn 1.8s ease-out forwards,
        pauseStay 4s ease-out forwards 1.8s,
        flyOut 1.6s ease-in forwards 5.8s;
    }

    @keyframes flyIn {
      0% {
        opacity: 0;
        transform: translateX(200px) translateY(-40px);
      }
      60% {
        opacity: 1;
        transform: translateX(-20px) translateY(0px);
      }
      100% {
        opacity: 1;
        transform: translateX(0px);
      }
    }

    @keyframes pauseStay {
      0% {
        opacity: 1;
        transform: translateX(0px);
      }
      100% {
        opacity: 1;
        transform: translateX(0px);
      }
    }

    @keyframes flyOut {
      0% {
        opacity: 1;
        transform: translateX(0px);
      }
      100% {
        opacity: 0;
        transform: translateX(-250px);
      }
    }

    nav a {
      display: block;
      margin: 12px auto;
      width: 70%;
      max-width: 300px;
      padding: 14px;
      background: #000;
      color: #ffa64d;
      text-decoration: none;
      font-size: 20px;
      border-radius: 8px;
      border: 2px solid #ffa64d;
      transition: 0.3s;
    }

    nav a:hover {
      background: #ffa64d;
      color: #000;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="header-area">
    <img src="public/nouvo-logo-bss-3.jpeg" class="logo" alt="Logo BSS1815">
    <img src="public/koukou-bss.jpeg" class="koukou" alt="Koukou BSS1815">
  </div>

  <nav>
    <a href="admin.html">Antre nan Admin</a>
    <a href="music.html">Seksyon Mizik</a>
    <a href="rara.html">RARA BSS1815</a>
  </nav>

</body>
</html>
