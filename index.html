<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSS 1815</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#ff7a00;
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  border-bottom:2px solid #ff7a00;
}

nav img{
  width:60px;
}

nav h1{
  font-size:18px;
}

nav button{
  background:#ff7a00;
  border:none;
  padding:8px 12px;
  cursor:pointer;
  font-weight:bold;
}

/* SLIDESHOW */
.slideshow{
  position:relative;
  height:80vh;
  overflow:hidden;
}

.slide{
  position:absolute;
  width:100%;
  height:100%;
  opacity:0;
  transition:1s;
}

.slide.active{
  opacity:1;
}

.slide img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
  padding:20px;
}

.gallery img{
  width:100%;
  height:200px;
  object-fit:cover;
  border:2px solid #ff7a00;
}
</style>
</head>

<body>

<nav>
  <img src="bss-logo-ofisyel.jpeg">
  <h1>BSS 1815</h1>
</nav>

<div class="slideshow" id="slideshow"></div>

<div class="gallery" id="gallery"></div>

<script>

const images = [
"only-u.jpeg","ange.jpeg","adan-signo.jpeg","andy.jpeg","badin.jpeg","blackson.jpeg",
"nadia-lafortune.jpg","macu1.jpg","pdg-ti-fre.jpg","mambo-fifi.jpg",
"roro-lajan.jpg","jeff-colin.jpg","fanfan.jpg","anpere-ti-rat.jpg",
"mario.jpg","perodin.jpg","cange1.jpg","maximax1.jpg","nadege.jpg",
"sinndy.jpg","may.jpg","asmide.jpg","andre-asouman.jpg","one-love.jpg",
"slogan.jpg","sonson1.jpg","ygens.jpg","prodin.jpeg","cange.jpg",
"ralph.jpg","slogan1.jpg","odelinne.jpg","jij-mayan.jpg","warrens.jpg",
"ti-marasa-yo.jpg","majis-mauc.jpg","emaze.jpg","la-belle-yole.jpg",
"maximax-multi-serv.jpeg","queen-naylove.jpeg","macu-mv.jpg","ti-leta.jpg"
];

const slideshow = document.getElementById("slideshow");
const gallery = document.getElementById("gallery");

images.forEach((img,i)=>{
  // slideshow
  let s = document.createElement("div");
  s.className="slide";
  if(i===0) s.classList.add("active");
  s.innerHTML=`<img src="${img}">`;
  slideshow.appendChild(s);

  // gallery
  let g = document.createElement("img");
  g.src=img;
  gallery.appendChild(g);
});

let slides=document.querySelectorAll(".slide");
let index=0;

setInterval(()=>{
  slides[index].classList.remove("active");
  index=(index+1)%slides.length;
  slides[index].classList.add("active");
},4000);

</script>

</body>
</html>
