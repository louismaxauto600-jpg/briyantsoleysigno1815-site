<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSS1815 HOMEPAGE</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: linear-gradient(to bottom, orange, black);
    font-family: Arial, sans-serif;
  }

  /* SLIDESHOW */
  .slideshow-container {
    width: 100%;
    max-width: 900px;
    margin: 40px auto;
    position: relative;
  }

  .slide {
    display: none;
  }

  .slide img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* KOUKOU ANIMASYON */
  #koukou {
    position: fixed;
    top: 20px;
    left: -200px;
    width: 150px;
    transition: transform 1.5s ease-in-out;
    z-index: 9999;
  }
</style>
</head>

<body>

<!-- KOUKOU -->
<img id="koukou" src="koukou.jpeg" alt="Koukou">

<!-- SLIDESHOW -->
<div class="slideshow-container">

  <div class="slide">
    <img src="slide1.jpeg" alt="Slide 1">
  </div>

  <div class="slide">
    <img src="slide2.jpeg" alt="Slide 2">
  </div>

  <div class="slide">
    <img src="slide3.jpeg" alt="Slide 3">
  </div>

  <div class="slide">
    <img src="slide4.jpeg" alt="Slide 4">
  </div>

</div>

<script>
/* SLIDESHOW 10s */
let slideIndex = 0;

function showSlides() {
  const slides = document.getElementsByClassName("slide");

  for (let i = 0; i < slides.length; i++) {
    slides[i].style.display = "none";
  }

  slideIndex++;
  if (slideIndex > slides.length) {
    slideIndex = 1;
  }

  slides[slideIndex - 1].style.display = "block";

  setTimeout(showSlides, 10000); // 10 seconds
}

showSlides();

/* KOUKOU FLY-IN → PAUSE 10s → FLY-OUT */
window.addEventListener("DOMContentLoaded", () => {
  const koukou = document.getElementById("koukou");

  // Fly-in
  setTimeout(() => {
    koukou.style.transform = "translateX(250px)";
  }, 500);

  // Pause 10 seconds
  setTimeout(() => {
    koukou.style.transform = "translateX(-300%)"; // Fly-out left
  }, 10500);
});
</script>

</body>
</html>
