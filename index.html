<!DOCTYPE html>.
<html lang="ht">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BRIYANTSOLEYSIGNO 1815</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #ff7b00 0, #000 55%, #000 100%);
      color: #fff;
      overflow-x: hidden;
    }

    .navbar {
      width: 100%;
      height: 70px;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1000;
      border-bottom: 2px solid #ff7b00;
    }

    .navbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .navbar-logo {
      height: 52px;
      width: 52px;
      border-radius: 50%;
      border: 2px solid #ff7b00;
      object-fit: cover;
    }

    .navbar-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #ffb366;
    }

    .menu {
      display: flex;
      gap: 22px;
    }

    .menu a {
      color: #ff7b00;
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .menu a:hover {
      color: #ffffff;
    }

    .main-wrapper {
      width: 100%;
      min-height: 100vh;
      padding-top: 90px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    .hero {
      width: 100%;
      max-width: 1200px;
      padding: 40px 24px 10px;
      text-align: center;
    }

    .hero-badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid #ff7b00;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #ffb366;
      margin-bottom: 12px;
    }

    .hero-title {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .hero-subtitle {
      font-size: 16px;
      color: #ffddb3;
      max-width: 700px;
      margin: 0 auto 18px;
    }

    .hero-line {
      width: 120px;
      height: 3px;
      margin: 0 auto;
      background: linear-gradient(90deg, #ff7b00, #ffb366);
      border-radius: 999px;
    }

    #koukou-wrapper {
      width: 100%;
      max-width: 1200px;
      margin-top: 40px;
      position: relative;
      height: 260px;
      overflow: hidden;
    }

    #koukou {
      position: absolute;
      top: 10px;
      right: -520px;
      width: 420px;
      max-width: 90vw;
      border-radius: 18px;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.9);
      border: 2px solid #ff7b00;
      background: #000;
      transition: all 1.2s ease-in-out;
    }

    #koukou img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 16px 16px 0 0;
    }

    #koukou-caption {
      padding: 10px 14px 12px;
      font-size: 14px;
      color: #ffddb3;
      text-align: center;
    }

    .slideshow-container {
      width: 100%;
      max-width: 1200px;
      margin: 20px auto 40px;
      display: none;
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.9);
      border: 2px solid #ff7b00;
      background: #000;
    }

    .slide {
      width: 100%;
      height: 420px;
      position: absolute;
      top: 0;
      left: 0;
      display: none;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.88;
    }

    .caption {
      position: absolute;
      bottom: 26px;
      left: 26px;
      right: 26px;
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      text-shadow: 2px 2px 8px #000;
      background: linear-gradient(90deg, rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.2));
      padding: 12px 16px;
      border-radius: 12px;
    }

    .caption small {
      display: block;
      font-size: 13px;
      font-weight: 400;
      color: #ffddb3;
      margin-top: 4px;
    }

    footer {
      width: 100%;
      padding: 14px 0 18px;
      text-align: center;
      font-size: 12px;
      color: #888;
      border-top: 1px solid #222;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="navbar-left">
      <img src="assets/logo/bss1815-logo.png" class="navbar-logo" />
      <div class="navbar-title">BRIYANTSOLEYSIGNO 1815</div>
    </div>
    <div class="menu">
      <a>HOME</a>
      <a>KIYÈS NOU YE</a>
      <a>MIZIK</a>
      <a>RARA</a>
      <a>ADMIN</a>
      <a>UPLOAD FOTO</a>
    </div>
  </div>

  <div class="main-wrapper">

    <section class="hero">
      <div class="hero-badge">INSTITISYON BRIYANTSOLEYSIGNO 1815</div>
      <h1 class="hero-title">DISIPLIN • IDANTITE • TEMWAYAJ</h1>
      <p class="hero-subtitle">
        Sa a se vitrin ofisyèl BRIYANTSOLEYSIGNO 1815.
      </p>
      <div class="hero-line"></div>
    </section>

    <section id="koukou-wrapper">
      <div id="koukou">
        <img src="assets/leaders/koukou-fly.jpeg" />
        <div id="koukou-caption">
          KOUKOU ap fè antre PRO‑MAX li.
        </div>
      </div>
    </section>

    <section class="slideshow-container" id="slideshow">
      <div class="slide">
        <img src="assets/temwayaj/1.jpeg" />
      </div>
      <div class="slide">
        <img src="assets/temwayaj/2.jpeg" />
      </div>
      <div class="slide">
        <img src="assets/temwayaj/3.jpeg" />
      </div>
    </section>

  </div>

  <!-- SCRIPT NAN BON PLAS -->
  <script>
    const koukou = document.getElementById("koukou");
    const slideshow = document.getElementById("slideshow");
    const slides = document.querySelectorAll(".slide");

    let slideIndex = 0;

    window.addEventListener("load", () => {
      if (!koukou || !slideshow || slides.length === 0) return;

      setTimeout(() => {
        koukou.style.right = "40px";
        koukou.style.opacity = "1";
      }, 500);

      setTimeout(() => {
        koukou.style.right = "-520px";
        koukou.style.opacity = "0";
      }, 10500);

      setTimeout(() => {
        slideshow.style.display = "block";
        startSlideshow();
      }, 12500);
    });

    function startSlideshow() {
      showSlide(slideIndex);

      setInterval(() => {
        slideIndex = (slideIndex + 1) % slides.length;
        showSlide(slideIndex);
      }, 3000);
    }

    function showSlide(index) {
      slides.forEach((slide) => slide.style.display = "none");
      slides[index].style.display = "block";
    }
  </script>

</body>
</html>
