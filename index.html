<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSS 1815</title>

<style>
:root{
  --orange:#ff7a00;
  --black:#000;
}

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#000;
  color:var(--orange);
  font-family:Arial, sans-serif;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.slider{
  width:100%;
  max-width:1200px;
  height:520px;
  border-radius:20px;
  overflow:hidden;
  border:2px solid var(--orange);
  box-shadow:0 0 40px var(--orange);
}

/* IMAGE */
#slide-image{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:opacity .8s ease, transform 6s ease;
}

/* TEAM */
.team{
  padding:80px 20px;
  text-align:center;
  background:linear-gradient(180deg,#000,#ff7a00,#000);
}

.team h2{
  font-size:40px;
  margin-bottom:10px;
  text-shadow:0 0 20px var(--orange);
}

.team p{
  margin-bottom:40px;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  max-width:1100px;
  margin:auto;
}

.gallery img{
  width:100%;
  height:260px;
  object-fit:cover;
  border-radius:15px;
  border:2px solid var(--orange);
  box-shadow:0 0 25px var(--orange);
}

/* MOBILE */
@media(max-width:768px){
  .slider{
    height:300px;
  }
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <div class="slider">
    <img id="slide-image" src="">
  </div>
</section>

<!-- TEAM SAN PRESYON -->
<section class="team">
  <h2>TEAM SAN PRESYON</h2>
  <p>NOU PAP METE MOUN DEYO • NOU PAP POUSE MOUN</p>

  <div class="gallery">
    <img src="assets/team/1.jpg">
    <img src="assets/team/2.jpg">
    <img src="assets/team/3.jpg">
    <img src="assets/team/4.jpg">
    <img src="assets/team/5.jpg">
  </div>
</section>

}

</script>

</body>
</html>
