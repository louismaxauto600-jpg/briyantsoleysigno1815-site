<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSS 1815</title>

<style>
body{
  margin:0;
  background:#000;
  color:#ff7a00;
  font-family:Arial;
  text-align:center;
}

/* HEADER */
h1{
  margin-top:40px;
  font-size:36px;
  text-shadow:0 0 15px #ff7a00;
}

/* SLIDESHOW */
.slider{
  width:90%;
  max-width:1000px;
  height:450px;
  margin:40px auto;
  overflow:hidden;
  border-radius:20px;
  border:2px solid #ff7a00;
  box-shadow:0 0 25px #ff7a00;
}

.slide{
  width:100%;
  height:100%;
  display:none;
}

.slide img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* TEAM */
.team{
  margin-top:60px;
}

.gallery{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  justify-content:center;
  padding:20px;
}

.gallery img{
  width:180px;
  height:240px;
  object-fit:cover;
  border:2px solid #ff7a00;
  border-radius:15px;
}
</style>
</head>

<body>

<h1>BRIYANT SOLEY SIGNO 1815</h1>

<div class="slider">
  <div class="slide"><img src="1.jpg"></div>
  <div class="slide"><img src="2.jpg"></div>
  <div class="slide"><img src="3.jpg"></div>
</div>

<div class="team">
  <h2>TEAM SAN PRESYON</h2>
  <p>NOU PAP METE MOUN DEYO • NOU PAP POUSE MOUN</p>

  <div class="gallery">
    <img src="1.jpg">
    <img src="2.jpg">
    <img src="3.jpg">
  </div>
</div>

<script>
let slideIndex = 0;
const slides = document.querySelectorAll(".slide");

function showSlides(){
  slides.forEach(s => s.style.display = "none");
  slideIndex++;
  if(slideIndex > slides.length){ slideIndex = 1; }
  slides[slideIndex-1].style.display = "block";
  setTimeout(showSlides, 3000);
}

showSlides();
</script>

</body>
</html>
