<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSS 1815</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial}

#introOverlay{
position:fixed;inset:0;background:#000;z-index:9999;
display:flex;justify-content:space-between;align-items:center;padding:0 8%;
}
.intro-logo{width:120px}
.intro-owl-wrap{transform:translateX(120vw);animation:in 2s forwards}
.intro-owl{width:200px;animation:wing .6s infinite}

@keyframes in{to{transform:translateX(0)}}
@keyframes out{to{transform:translateX(120vw);opacity:0}}
@keyframes wing{50%{transform:scaleY(.9)}}

.hero{height:100vh;position:relative;overflow:hidden}
.slide{position:absolute;inset:0;opacity:0;transition:1s}
.slide.active{opacity:1}
.slide img{width:100%;height:100%;object-fit:cover}

.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;padding:20px}
.gallery img{width:100%;height:200px;object-fit:cover}
</style>
</head>

<body>

<div id="introOverlay">
<img src="bss-logo-ofisyel.jpeg" class="intro-logo">
<div class="intro-owl-wrap" id="owlWrap">
<img src="owl.png" class="intro-owl">
</div>
</div>

<div class="hero" id="slides"></div>
<div class="gallery" id="gallery"></div>

<script>
const images=[
"only-u.jpeg","ange.jpeg","adan-signo.jpeg","andy.jpeg","badin.jpeg","blackson.jpeg",
"nadia-lafortune.jpg","macu1.jpg","pdg-ti-fre.jpg","mambo-fifi.jpg","roro-lajan.jpg",
"jeff-colin.jpg","fannfan.jpg","anpere-ti-rat.jpg","mario.jpg","perodin.jpg",
"cange1.jpg","maximax1.jpg","nadege.jpg","sinndy.jpg","may.jpg","asmide.jpg",
"andre-asouman.jpg","one-love.jpg","slogan.jpg","sonsonn1.jpg","ygens.jpg"
];

const slides=document.getElementById("slides");
const gallery=document.getElementById("gallery");

images.forEach((img,i)=>{
let s=document.createElement("div");
s.className="slide";
s.innerHTML=`<img src="${img}">`;
slides.appendChild(s);

let g=document.createElement("img");
g.src=img;
gallery.appendChild(g);
});

let allSlides=document.querySelectorAll(".slide");
let i=0;
function show(){
allSlides.forEach(s=>s.classList.remove("active"));
allSlides[i].classList.add("active");
i=(i+1)%allSlides.length;
}
setInterval(show,3000);
show();

setTimeout(()=>{owlWrap.style.animation="out 2s forwards"},6000);
setTimeout(()=>{introOverlay.style.display="none"},8000);
</script>

</body>
</html>
