  const slidesContainer = document.getElementById("slidesContainer");
  const galleryGrid = document.getElementById("galleryGrid");
  const slideCounter = document.getElementById("slideCounter");
  const progressBar = document.getElementById("progressBar");

  const homeBtn = document.getElementById("homeBtn");
  const galleryBtn = document.getElementById("galleryBtn");
  const heroGalleryBtn = document.getElementById("heroGalleryBtn");
  const heroHomeBtn = document.getElementById("heroHomeBtn");
  const homePage = document.getElementById("homePage");
  const galleryPage = document.getElementById("galleryPage");

  const introOverlay = document.getElementById("introOverlay");
  const owlWrap = document.getElementById("owlWrap");

  function prettyName(file) {
    let name = file
      .replace(".jpeg","")
      .replace(".jpg","")
      .replace(".png","")
      .replace(/[-_]/g," ");
    return name.replace(/\b\w/g, l => l.toUpperCase());
  }

  allImages.forEach((file) => {
    const name = prettyName(file);

    const slide = document.createElement("div");
    slide.className = "slide";
    slide.innerHTML = `<img src="${file}" alt="${name}">`;
    slidesContainer.appendChild(slide);

    const card = document.createElement("div");
    card.className = "gallery-card";
    card.innerHTML = `
      <img src="${file}" alt="${name}">
      <div class="gallery-caption">${name}</div>
    `;
    galleryGrid.appendChild(card);
  });

  const slides = document.querySelectorAll(".slide");
  let currentSlide = 0;
  const slideDuration = 10000;
  let slideInterval = null;

  function updateCounter() {
    if (slideCounter) {
      slideCounter.textContent = `${currentSlide + 1} / ${slides.length}`;
    }
  }

  function resetProgressBar() {
    if (!progressBar) return;
    progressBar.style.transition = "none";
    progressBar.style.width = "0%";
    setTimeout(() => {
      progressBar.style.transition = `width ${slideDuration}ms linear`;
      progressBar.style.width = "100%";
    }, 60);
  }

  function showSlide(index) {
    slides.forEach((slide, i) => {
      slide.classList.toggle("active", i === index);
    });
    currentSlide = index;
    updateCounter();
    resetProgressBar();
  }

  function nextSlide() {
    let next = currentSlide + 1;
    if (next >= slides.length) next = 0;
    showSlide(next);
  }

  function startSlideshow() {
    if (!slides.length) return;
    showSlide(0);
    if (slideInterval) clearInterval(slideInterval);
    slideInterval = setInterval(nextSlide, slideDuration);
  }

  function showHome() {
    homePage.classList.add("active");
    galleryPage.classList.remove("active");
    homeBtn.classList.add("active");
    galleryBtn.classList.remove("active");
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function showGallery() {
    galleryPage.classList.add("active");
    homePage.classList.remove("active");
    galleryBtn.classList.add("active");
    homeBtn.classList.remove("active");
    if (introOverlay) introOverlay.style.display = "none";
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  homeBtn.addEventListener("click", showHome);
  galleryBtn.addEventListener("click", showGallery);
  heroGalleryBtn.addEventListener("click", showGallery);
  heroHomeBtn.addEventListener("click", showHome);

  /* OWL INTRO */
  if (introOverlay && owlWrap) {
    setTimeout(() => {
      owlWrap.classList.add("fly-out");
    }, 6000);

    setTimeout(() => {
      introOverlay.classList.add("fadeOut");
      startSlideshow();
    }, 8000);
  } else {
    startSlideshow();
  }
</script>
<div id="introOverlay">

  </div>
</div>
