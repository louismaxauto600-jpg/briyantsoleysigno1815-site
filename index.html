<!-- ===================== -->
<!--         CSS           -->
<!-- ===================== -->

<style>
body {
    background: #000;
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    font-family: sans-serif;
}

/* KOUKOU ANIMASYON */
#koukou-container {
    position: fixed;
    top: 20%;
    right: -400px;
    z-index: 9999;
}

#koukou {
    width: 350px;
    transition: transform 1s ease-in-out;
}

/* SLIDESHOW */
#slideshow {
    display: none;
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    margin-top: 40px;
}

.slide {
    display: none;
    text-align: center;
}

.slide img {
    width: 100%;
    border: 4px solid #ff7a00;
}

.testimonial {
    color: #ff7a00;
    font-size: 20px;
    margin-top: 10px;
}
</style>

<!-- ===================== -->
<!--         JS            -->
<!-- ===================== -->

<script>
// KOUKOU FLY-IN
setTimeout(() => {
    document.getElementById("koukou-container").style.right = "20px";
}, 500);

// PAUSE 10s + OPEN WINGS
setTimeout(() => {
    document.getElementById("koukou").style.transform = "scale(1.15)";
}, 10500);

// FLY-OUT LEFT
setTimeout(() => {
    document.getElementById("koukou-container").style.right = "120%";
}, 15000);

// START SLIDESHOW
setTimeout(() => {
    document.getElementById("slideshow").style.display = "block";
    startSlideshow();
}, 16500);

// SLIDESHOW FUNCTION
let slideIndex = 0;
function startSlideshow() {
    let slides = document.getElementsByClassName("slide");
    for (let i = 0; i < slides.length; i++) slides[i].style.display = "none";
    slideIndex++;
    if (slideIndex > slides.length) slideIndex = 1;
    slides[slideIndex - 1].style.display = "block";
    setTimeout(startSlideshow, 5000);
}
</script>
