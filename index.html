<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRIYANT SOLEY SIGNO 1815</title>

<style>
:root{--orange:#ff7a00;--black:#000;}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#ff7a00;font-family:Arial,sans-serif;overflow-x:hidden}
header{text-align:center;padding:35px 15px;border-bottom:2px solid #ff7a00;background:#000}
header h1{font-size:38px;text-shadow:0 0 18px #ff7a00}
header p{margin-top:10px;font-size:18px}

.hero{padding:35px 15px;text-align:center;background:radial-gradient(circle,#1a0a00,#000 70%)}
.slider{
  width:100%;
  max-width:1150px;
  height:560px;
  margin:auto;
  border:3px solid #ff7a00;
  border-radius:22px;
  overflow:hidden;
  box-shadow:0 0 35px #ff7a00;
  background:#000;
}
#slide-image{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  transition:opacity .7s ease, transform 7s ease;
}
.notice{padding:20px;font-size:20px}

.team{padding:70px 20px;text-align:center;background:linear-gradient(180deg,#000,#1a0a00,#000)}
.team h2{font-size:40px;text-shadow:0 0 18px #ff7a00}
.team p{font-size:18px;margin:15px 0 35px}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:18px;
  max-width:1100px;
  margin:auto;
}
.gallery img{
  width:100%;
  height:260px;
  object-fit:cover;
  border-radius:18px;
  border:2px solid #ff7a00;
  box-shadow:0 0 22px #ff7a00;
  background:#000;
}

footer{text-align:center;padding:30px;border-top:2px solid #ff7a00}

@media(max-width:768px){
  header h1{font-size:27px}
  .slider{height:340px}
}
</style>
</head>

<body>

<header>
  <h1>BRIYANT SOLEY SIGNO 1815</h1>
  <p>LEADERSHIP • DISCIPLINE • RESPÈ • DEVLOPMAN</p>
</header>

<section class="hero">
  <div class="slider">
    <img id="slide-image" src="don-dodo.jpg" alt="BSS Slideshow">
  </div>
  <div class="notice">BSS1815 — ORANGE AK NWA • SAN PRESYON</div>
</section>

<section class="team">
  <h2>TEAM SAN PRESYON</h2>
  <p>NOU PAP METE MOUN DEYO • NOU PAP POUSE MOUN</p>

  <div class="gallery">
    <img src="assets/team/1.jpg" alt="Team San Presyon">
    <img src="assets/team/2.jpg" alt="Team San Presyon">
    <img src="assets/team/3.jpg" alt="Team San Presyon">
    <img src="assets/team/4.jpg" alt="Team San Presyon">
    <img src="assets/team/5.jpg" alt="Team San Presyon">
  </div>
</section>

<footer>
  BRIYANT SOLEY SIGNO 1815 • MAXIMAX MULTI SERVICES
</footer>

<script>
const slides = [
  "don-dodo.jpg",
  "jude-joseph.joseph.jpg",
  "magazen.jpg",
  "majistra-mauclaire.jpeg",
  "may.jpg",
  "queen-naylove.jpg",
  "robert-colin.jpg",
  "sindy-berlus.jpg",
  "sonson.jpg",
  "t-leta.jpg",
  "sonsonn-mia.jpg",
  "shirley-klein.jpeg",
  "roberson.png",
  "prez-ti-rat.jpeg",
  "serette.jpg",
  "sosonn-bank.jpg",
  "ofisyel.jpg",
  "maximax-m-serv.jpg"
];

let i = 0;
const img = document.getElementById("slide-image");

function changeSlide(){
  img.style.opacity = "0";
  img.style.transform = "scale(1)";
  setTimeout(()=>{
    i = (i + 1) % slides.length;
    img.src = slides[i];
    img.style.opacity = "1";
    img.style.transform = "scale(1.06)";
  },500);
}

img.onerror = function(){
  this.style.display = "none";
  document.querySelector(".slider").innerHTML =
    "<div style='padding:120px 20px;font-size:28px;color:#ff7a00;'>FOTO YO PA JWENN — VERIFYE NON FILE YO NAN FOLDER LA</div>";
};

setInterval(changeSlide, 5000);
</script>

</body>
</html>
