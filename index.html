<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSS 1815</title>

<style>
body{
  margin:0;
  background:#000;
  color:#ff7a00;
  font-family:Arial;
  text-align:center;
}

/* HEADER */
h1{
  margin-top:30px;
  text-shadow:0 0 15px #ff7a00;
}

/* SLIDER */
.slider{
  width:90%;
  max-width:1000px;
  height:450px;
  margin:40px auto;
  overflow:hidden;
  border-radius:20px;
  border:2px solid #ff7a00;
  box-shadow:0 0 25px #ff7a00;
  position:relative;
}

.slide{
  position:absolute;
  width:100%;
  height:100%;
  opacity:0;
  animation:slide 15s infinite;
}

.slide img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* TIMING */
.slide:nth-child(1){animation-delay:0s;}
.slide:nth-child(2){animation-delay:5s;}
.slide:nth-child(3){animation-delay:10s;}

@keyframes slide{
  0%{opacity:0;}
  10%{opacity:1;}
  30%{opacity:1;}
  40%{opacity:0;}
  100%{opacity:0;}
}

/* TEAM */
.team{
  margin-top:50px;
}

.gallery{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  justify-content:center;
  padding:20px;
}

.gallery img{
  width:180px;
  height:240px;
  object-fit:cover;
  border:2px solid #ff7a00;
  border-radius:15px;
}
</style>
</head>

<body>

<h1>BRIYANT SOLEY SIGNO 1815</h1>

<div class="slider">
  <div class="slide"><img src="don-dodo.jpg"></div>
  <div class="slide"><img src="may.jpg"></div>
  <div class="slide"><img src="queen-naylove.jpg"></div>
</div>

<div class="team">
  <h2>TEAM SAN PRESYON</h2>
  <p>NOU PAP METE MOUN DEYO • NOU PAP POUSE MOUN</p>

  <div class="gallery">
    <img src="don-dodo.jpg">
    <img src="may.jpg">
    <img src="queen-naylove.jpg">
  </div>
</div>

</body>
</html>
