<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BSS 1815 — ADMIN DASHBOARD</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(180deg, #000000, #0a0a0a, #1b1208);
      color: white;
      font-family: "Segoe UI", Arial, sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* TOPBAR */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: #000;
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 3px solid #ff8c00;
      z-index: 10;
    }

    .brand {
      font-size: 24px;
      font-weight: 900;
      color: #ff8c00;
      text-shadow: 0 0 10px rgba(255, 140, 0, 0.6);
    }

    /* SIDEBAR */
    .sidebar {
      width: 230px;
      background: #000;
      padding-top: 90px;
      border-right: 3px solid #ff8c00;
      overflow-y: auto;
    }

    .sidebar-item {
      padding: 10px;
      text-align: center;
    }

    .sidebar-item img {
      width: 90%;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .sidebar-item img:hover {
      transform: scale(1.05);
      box-shadow: 0 0 12px rgba(255, 140, 0, 0.7);
    }

    /* CONTENT AREA */
    #content-area {
      flex: 1;
      padding: 100px 30px 30px 30px;
      overflow-y: auto;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="brand">BSS 1815 — ADMIN</div>
    <button id="logoutBtn" class="hidden" onclick="logoutAdmin()">Logout</button>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar hidden" id="sidebar">

    <!-- SUPERADMIN BUTTON -->
    <div class="sidebar-item superadmin-only hidden">
      <img src="assets/img/super-admin-b.jpeg" onclick="loadModule('superadmin')">
    </div>

    <!-- ADMIN BUTTON -->
    <div class="sidebar-item">
      <img src="assets/img/admin-dash-b.jpeg" onclick="loadModule('dashboard')">
    </div>

    <!-- UPLOAD BUTTON -->
    <div class="sidebar-item">
      <img src="assets/img/admin-dashboard-upload-final.jpeg" onclick="loadModule('upload')">
    </div>

  </div>

  <!-- CONTENT AREA -->
  <div id="content-area">
    <h2>Byenvini nan BSS 1815 ADMIN PANEL</h2>
    <p>Tanpri konekte pou kontinye.</p>
  </div>

  <!-- LOGIN SECTION (FLOATING) -->
  <div id="loginSection" style="
    position: fixed;
    top: 120px;
    left: 50%;
    transform: translateX(-50%);
    width: 350px;
    background: #0d0d0d;
    padding: 25px;
    border-radius: 10px;
    border: 2px solid #ff8c00;
    box-shadow: 0 0 15px rgba(255,140,0,0.5);
  ">
    <h2 style="text-align:center;color:#ff8c00;">Admin Login</h2>
    <input id="adminEmail" type="email" placeholder="Imel admin">
    <input id="adminPassword" type="password" placeholder="Modpas admin">
    <button onclick="loginAdmin()">Login</button>
  </div>

  <!-- SCRIPTS (TOUJOU ANBA) -->
  <script type="module" src="firebase.js"></script>
  <script type="module" src="admin.js"></script>
  <script src="js/admin-dashboard.js"></script>
  <script src="js/admin-dashboard-upload-final.js"></script>

</body>
</html>
