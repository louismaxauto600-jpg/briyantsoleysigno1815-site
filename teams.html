<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSS 1815 — Ekip Ofisyèl</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #000;
            color: #fff;
            margin: 0;
            padding: 0;
        }<body>
z
<header>
  <img src="nouvo-logo-bss-3.jpeg" alt="BSS 1815 Logo" class="brand-logo-img">
</header>

<!-- Rès kontni paj la isit la -->

        h1 {
            text-align: center;
            color: #FFA559; /* Orange Apricot */
            margin-top: 40px;
            font-size: 40px;
            letter-spacing: 2px;
        }

        .teams-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 40px;
        }

        .team-card {
            background: #111;
            border: 2px solid #FFA559;
            border-radius: 10px;
            overflow: hidden;
            text-align: center;
            padding-bottom: 20px;
        }

        .team-card img {
            width: 100%;
            height: auto;
            display: block;
        }

        .team-card h2 {
            color: #FFA559;
            margin: 15px 0 5px;
            font-size: 24px;
        }

        .team-card a {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 18px;
            background: #FFA559;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
        }

        .team-card a:hover {
            background: #ff8c2b;
        }
    </style>
</head>

<body>

    <h1>EKIP OFISYÈL BSS 1815</h1>

    <div class="teams-container">

        <!-- MIAMI AN AKSYON -->
        <div class="team-card">
            <img src="images/teams/miami-an-aksyon.jpeg" alt="MIAMI AN AKSYON">
            <h2>MIAMI AN AKSYON</h2>
        </div>

        <!-- TEAM SAN PRESYON -->
        <div class="team-card">
            <img src="images/teams/team-san-presyon.jpeg" alt="TEAM SAN PRESYON">
            <h2>TEAM SAN PRESYON</h2>
        </div>

        <!-- TEAM BACKUP -->
        <div class="team-card">
            <img src="images/teams/team-backup-II.jpeg" alt="TEAM BACKUP">
            <h2>TEAM BACKUP</h2>
        </div>

        <!-- SFC 5 STARS -->
        <div class="team-card">
            <img src="images/teams/sfc-5-stars.jpeg" alt="SFC 5 STARS">
            <h2>SFC 5 STARS ★★★★★</h2>
        </div>

        <!-- TEAM ANGRENAY -->
        <div class="team-card">
            <img src="images/teams/team-angrenay.jpeg" alt="TEAM ANGRENAY">
            <h2>TEAM ANGRENAY</h2>
        </div>

    </div>

</body>
</html>
