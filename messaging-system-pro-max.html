<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <title>BSS1815 — MESSAGING SYSTEM PRO‑MAX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif;}

    body{
      background:#050505;
      color:#f7f2ec;
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    header{
      padding:20px;
      border-bottom:1px solid #2b2b2b;
      background:#0a0a0a;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    header h1{
      font-size:22px;
      color:#ff9b3b;
      text-transform:uppercase;
      letter-spacing:2px;
    }

    header span{
      font-size:12px;
      color:#ff9b3b;
      border:1px solid #ff9b3b55;
      padding:4px 10px;
      border-radius:999px;
      text-transform:uppercase;
    }

    main{
      padding:25px;
      flex:1;
      display:flex;
      gap:20px;
    }

    .contacts{
      width:260px;
      background:#0d0d0d;
      border:1px solid #2b2b2b;
      border-radius:12px;
      padding:15px;
      overflow-y:auto;
    }

    .contacts h2{
      font-size:15px;
      margin-bottom:10px;
      text-transform:uppercase;
      letter-spacing:1px;
    }

    .contact{
      padding:10px;
      border-radius:8px;
      background:#151515;
      border:1px solid #2b2b2b;
      margin-bottom:10px;
      cursor:pointer;
      transition:0.2s;
    }

    .contact:hover{
      background:#1f1f1f;
    }

    .contact h3{
      font-size:14px;
      margin-bottom:4px;
    }

    .contact small{
      font-size:11px;
      color:#aaa;
    }

    .chat-box{
      flex:1;
      background:#0d0d0d;
      border:1px solid #2b2b2b;
      border-radius:12px;
      display:flex;
      flex-direction:column;
    }

    .chat-header{
      padding:15px;
      border-bottom:1px solid #2b2b2b;
      font-size:14px;
      text-transform:uppercase;
      letter-spacing:1px;
      color:#ff9b3b;
    }

    .messages{
      flex:1;
      padding:20px;
      overflow-y:auto;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .msg{
      max-width:70%;
      padding:12px;
      border-radius:10px;
      font-size:13px;
      line-height:1.4;
    }

    .me{
      align-self:flex-end;
      background:#ff9b3b;
      color:#050505;
    }

    .them{
      align-self:flex-start;
      background:#1a1a1a;
      border:1px solid #333;
    }

    .chat-input{
      padding:15px;
      border-top:1px solid #2b2b2b;
      display:flex;
      gap:10px;
    }

    .chat-input input{
      flex:1;
      padding:12px;
      border-radius:8px;
      border:1px solid #333;
      background:#000;
      color:#fff;
    }

    .chat-input button{
      padding:12px 18px;
      background:linear-gradient(90deg,#ff9b3b,#ff6a00);
      border:none;
      border-radius:8px;
      font-weight:700;
      cursor:pointer;
      color:#050505;
    }

    footer{
      padding:15px;
      text-align:center;
      font-size:12px;
      color:#777;
      border-top:1px solid #2b2b2b;
      background:#0a0a0a;
    }
  </style>

  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="messaging-system-pro-max.js"></script>
</head>

<body>

  <header>
    <h1>MESSAGING SYSTEM PRO‑MAX</h1>
    <span id="roleChip">...</span>
  </header>

  <main>

    <div class="contacts">
      <h2>Kontak PRO‑MAX</h2>
      <div id="contactsList"></div>
    </div>

    <div class="chat-box">
      <div class="chat-header" id="chatHeader">Chwazi yon kontak</div>

      <div class="messages" id="messagesBox"></div>

      <div class="chat-input">
        <input id="msgInput" type="text" placeholder="Ekri mesaj la…">
        <button id="sendMsgBtn">Voye</button>
      </div>
    </div>

  </main>

  <footer>
    © 2026 BSS1815 — Messaging System PRO‑MAX.
  </footer>

</body>
</html>
