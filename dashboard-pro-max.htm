<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BSS1815 – Dashboard PRO‑MAX</title>

  <style>
    body {
      margin: 0;
      background: linear-gradient(to bottom, #000000, #FF7A00);
      color: #FF7A00;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    /* NAVIGATION */
    .bss-nav {
      width: 100%;
      background: #000000;
      border-bottom: 2px solid #FF7A00;
      padding: 12px 0;
      display: flex;
      justify-content: center;
      gap: 26px;
      position: sticky;
      top: 0;
      z-index: 999;
    }

    .bss-nav a {
      color: #FF7A00;
      text-decoration: none;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 15px;
      transition: 0.2s ease;
    }

    .bss-nav a:hover {
      color: #000000;
      background: #FF7A00;
      padding: 6px 12px;
      border-radius: 6px;
      box-shadow: 0 0 14px #FF7A00;
    }

    /* HEADER */
    .bss-header {
      width: 100%;
      padding: 16px 24px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      background: linear-gradient(to right, #000000, #FF7A00, #000000);
      border-bottom: 2px solid #FF7A00;
    }

    /* LOGO */
    .bss-logo-wrap {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid #000000;
      box-shadow: 0 0 18px #FF7A00;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000000;
      animation: logoRotateIn 1.2s ease-out forwards;
    }

    .bss-left-logo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      animation: logoSpin 4s linear infinite;
    }

    /* TIT */
    .bss-title {
      flex: 1;
      text-align: center;
      font-size: 32px;
      font-weight: 900;
      color: #000000;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 6px rgba(255,122,0,0.6);
      padding: 0 10px;
    }

    /* KOUKOU */
    @keyframes koukouSequence {
      0% { transform: translateX(-160px); opacity: 0; }
      20% { transform: translateX(0); opacity: 1; }
      60% { transform: translateX(0); opacity: 1; }
      100% { transform: translateX(180px); opacity: 0; }
    }

    .bss-right-koukou {
      width: 180px;
      height: auto;
      margin-bottom: 6px;
      animation: koukouSequence 4.5s ease-out forwards;
    }

    /* SLOGAN */
    .bss-slogan {
      margin-top: 10px;
      font-size: 22px;
      font-weight: 900;
      color: #FF7A00;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 14px rgba(255,122,0,0.9);
      animation: sloganPulse 2.5s infinite ease-in-out;
    }

    @keyframes sloganPulse {
      0% { opacity: 0.7; text-shadow: 0 0 10px #FF7A00; }
      50% { opacity: 1; text-shadow: 0 0 26px #FF7A00; }
      100% { opacity: 0.7; text-shadow: 0 0 10px #FF7A00; }
    }

    /* DASHBOARD CARDS */
    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      padding: 40px 20px;
      max-width: 1200px;
      margin: auto;
    }

    .card {
      background: #000000;
      border: 2px solid #FF7A00;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 14px #FF7A00;
      transition: 0.2s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 0 22px #FF7A00;
    }

    .card h3 {
      margin-top: 0;
      color: #FF7A00;
      font-size: 22px;
      font-weight: 900;
    }

    .card a {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 18px;
      background: #FF7A00;
      color: #000000;
      font-weight: 900;
      text-decoration: none;
      border-radius: 6px;
      border: 2px solid #000000;
      box-shadow: 0 0 14px #FF7A00;
    }

    .card a:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 22px #FF7A00;
    }

  </style>
</head>

<body>

  <!-- NAVIGATION -->
  <nav class="bss-nav">
    <a href="index.html">Akèy</a>
    <a href="kiyesnouye.html">Kiyès nou ye</a>
    <a href="mizik.html">Mizik</a>
    <a href="admin.html">Admin</a>
  </nav>

  <!-- HEADER -->
  <header class="bss-header">
    <div class="bss-logo-wrap">
      <img src="nouvo-logo-bss-3.jpeg" class="bss-left-logo" alt="BSS1815 Logo">
    </div>

    <h1 class="bss-title">Dashboard BSS1815</h1>

    <img src="koukou-mekontan.jpeg" class="bss-right-koukou" alt="Koukou BSS1815">
  </header>

  <!-- SLOGAN -->
  <div class="bss-slogan">Nou soti lwen, nou kanpe wo.</div>

  <!-- DASHBOARD CARDS -->
  <div class="dashboard">

    <div class="card">
      <h3>Mizisyen</h3>
      <a href="admin2.html">Jere Mizisyen</a>
    </div>

    <div class="card">
      <h3>Mizik RARA</h3>
      <a href="rara.html">RARA System</a>
    </div>

    <div class="card">
      <h3>Uploads</h3>
      <a href="upload.html">Upload Fichye</a>
    </div>

    <div class="card">
      <h3>Transaksyon</h3>
      <a href="transactions.html">Gade Transaksyon</a>
    </div>

    <div class="card">
      <h3>Logs</h3>
      <a href="security_logs.html">Security Logs</a>
    </div>

  </div>

</body>
</html>
