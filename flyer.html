<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSS1815 — FLYER CENTER PRO‑MAX</title>

    <style>
        :root {
            --abriko: #FF7A00;
            --nwa: #000000;
            --blan: #FFFFFF;
        }

        body {
            margin: 0;
            background: var(--nwa);
            color: var(--blan);
            font-family: Arial, sans-serif;
        }

        .wrap {
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .shell {
            width: 100%;
            max-width: 1200px;
            background: linear-gradient(to bottom right, #FF7A00, #000000);
            padding: 30px;
            border-radius: 16px;
            border: 2px solid #FF7A00;
            box-shadow: 0 0 30px rgba(255,120,0,0.7);
        }

        .logo-zone img {
            width: 120px;
            filter: drop-shadow(0 0 10px #FF7A00);
        }

        .title-main {
            color: #FF7A00;
            font-size: 32px;
            text-align: center;
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .subtitle {
            text-align: center;
            font-size: 15px;
            opacity: 0.9;
            margin-bottom: 25px;
        }

        .btn-create {
            display: block;
            width: 250px;
            margin: 0 auto 30px auto;
            padding: 14px;
            background: #FF7A00;
            color: #000;
            text-align: center;
            font-weight: bold;
            border-radius: 8px;
            text-decoration: none;
            font-size: 16px;
            border: 2px solid #FF7A00;
            transition: 0.3s;
        }

        .btn-create:hover {
            background: #000;
            color: #FF7A00;
        }

        .inner {
            background: #111;
            padding: 25px;
            border-radius: 12px;
            border: 2px solid #FF7A00;
            box-shadow: 0 0 18px rgba(255,120,0,0.5);
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .flyer-card {
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #FF7A00;
            box-shadow: 0 0 15px rgba(255,120,0,0.4);
            text-align: center;
        }

        .flyer-card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            border-bottom: 2px solid #FF7A00;
        }

        .flyer-card h3 {
            color: #FF7A00;
            font-size: 20px;
            margin: 12px 0 6px 0;
        }

        .flyer-card p {
            font-size: 14px;
            opacity: 0.85;
            margin-bottom: 12px;
        }

        .btn-manage {
            width: 90%;
            padding: 10px;
            background: #FF7A00;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            color: #000;
            margin-bottom: 15px;
        }

        footer {
            background: #000;
            padding: 25px;
            text-align: center;
            border-top: 2px solid #FF7A00;
            margin-top: 40px;
        }

        footer p {
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

<div class="wrap">
    <div class="shell">

        <div class="logo-zone">
            <img src="/PATH/logo-bss2.jpeg" alt="BSS1815 Logo">
        </div>

        <div class="title-main">FLYER CENTER — BSS1815 PRO‑MAX</div>
        <div class="subtitle">
            Tout flyer ofisyèl BSS1815 yo nan yon sèl kote. Kreye, jere, modifye, telechaje.
        </div>

        <a href="flyer-editor.html" class="btn-create">+ Kreye Nouvo Flyer</a>

        <div class="inner">

            <div class="grid-3">

                <div class="flyer-card">
                    <img src="/PATH/flyers/f1.jpg">
                    <h3>Flyer #1</h3>
                    <p>Evènman espesyal BSS1815.</p>
                    <button class="btn-manage">Manage</button>
                </div>

                <div class="flyer-card">
                    <img src="/PATH/flyers/f2.jpg">
                    <h3>Flyer #2</h3>
                    <p>Parad ofisyèl ekip la.</p>
                    <button class="btn-manage">Manage</button>
                </div>

                <div class="flyer-card">
                    <img src="/PATH/flyers/f3.jpg">
                    <h3>Flyer #3</h3>
                    <p>Anons espesyal ak mizisyen yo.</p>
                    <button class="btn-manage">Manage</button>
                </div>

            </div>

        </div>

    </div>
</div>

<footer>
    <p>BSS1815 © 2026 — FLYER CENTER — PRO‑MAX Edition.</p>
</footer>

</body>
</html>
