<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8" />
  <title>Paramèt Sistèm – BSS1815 PRO‑MAX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="ui-ux-pro-max-final.css" />
</head>
<body>

  <div id="globalLoader" class="loader loader-hidden"></div>

  <div class="app-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="logo-bss1815.png" alt="BSS1815" />
        <span>BSS1815 ADMIN</span>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard-pro-max.html" class="sidebar-link">📊 Dashboard</a>
        <a href="audit-log-pro-max.html" class="sidebar-link">📜 Audit Logs</a>
        <a href="reports-pro-max.html" class="sidebar-link">📑 Rapò</a>
        <a href="role-manager-pro-max.html" class="sidebar-link">🛡️ Wòl</a>
        <a href="backup-restore-pro-max.html" class="sidebar-link">💾 Backup / Restore</a>
        <a href="media-manager-pro-max.html" class="sidebar-link">🖼️ Media</a>
        <a href="settings-pro-max.html" class="sidebar-link active">⚙️ Paramèt</a>
      </nav>
    </aside>

    <!-- MAIN -->
    <main class="app-main">

      <header class="app-header">
        <div class="app-title">Paramèt Sistèm</div>

        <div class="app-header-right">
          <span id="userName"></span>
          <span id="roleChip" class="chip-role">ROLE</span>
          <button id="logoutBtn" class="btn-logout">Dekonekte</button>
        </div>
      </header>

      <section class="app-content">

        <!-- LOGO -->
        <div class="card" style="margin-bottom:20px;">
          <div class="card-title">Logo Sit la</div>

          <input id="logoFile" type="file" class="input" accept="image/*" />
          <button id="uploadLogoBtn" class="btn-primary" style="margin-top:10px;">Mete Logo</button>

          <div style="margin-top:15px;">
            <img id="currentLogo" src="" style="max-width:180px; border-radius:8px;" />
          </div>
        </div>

        <!-- SITE SETTINGS -->
        <div class="card" style="margin-bottom:20px;">
          <div class="card-title">Enfòmasyon Sit la</div>

          <input id="siteTitle" class="input" placeholder="Tit sit la" />
          <input id="primaryColor" class="input" placeholder="Koulè prensipal (#ffcc00)" />

          <button id="saveSettingsBtn" class="btn-primary" style="margin-top:10px;">
            Sove Paramèt
          </button>
        </div>

        <!-- MAINTENANCE MODE -->
        <div class="card">
          <div class="card-title">Maintenance Mode</div>

          <button id="enableMaintenanceBtn" class="btn-danger">Aktive Maintenance</button>
          <button id="disableMaintenanceBtn" class="btn" style="margin-left:10px;">Dekative</button>
        </div>

      </section>

    </main>

  </div>

  <script type="module" src="ui-ux-pro-max-final.js"></script>
  <script type="module" src="system-kernel-pro-max.js"></script>
  <script type="module" src="settings-pro-max.js"></script>

</body>
</html>
