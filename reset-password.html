<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSS1815 — Reset Password</title>

    <link rel="stylesheet" href="styles/style.css">

    <style>
        /* RESET PASSWORD PRO-MAX */
        .reset-container {
            max-width: 420px;
            margin: 80px auto;
            background-color: #111;
            padding: 30px;
            border-radius: 10px;
            border: 3px solid #ff7f00;
            text-align: center;
        }

        .reset-container h2 {
            color: #ff7f00;
            margin-bottom: 20px;
        }

        .reset-container input {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border-radius: 5px;
            border: none;
        }

        .reset-btn {
            width: 100%;
            padding: 12px;
            background-color: #ff7f00;
            border: none;
            color: black;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .reset-btn:hover {
            background-color: white;
        }

        .error {
            color: #ff0033;
            margin-top: 10px;
        }

        .success {
            color: #00ff88;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="reset-container">
        <h2>Reset Password</h2>

        <input type="password" id="oldPass" placeholder="Ansyen modpas" required>
        <input type="password" id="newPass" placeholder="Nouvo modpas" required>
        <input type="password" id="confirmPass" placeholder="Konfime nouvo modpas" required>

        <button class="reset-btn" onclick="resetPassword()">Chanje Modpas</button>

        <p id="msg"></p>
    </div>

    <script>
        // RESET PASSWORD SYSTEM PRO-MAX
        function resetPassword() {
            const oldPass = document.getElementById("oldPass").value.trim();
            const newPass = document.getElementById("newPass").value.trim();
            const confirmPass = document.getElementById("confirmPass").value.trim();
            const msg = document.getElementById("msg");

            // Default SUPER ADMIN password (ou ka chanje li)
            const CURRENT_PASSWORD = "1815";

            // Verify old password
            if (oldPass !== CURRENT_PASSWORD) {
                msg.textContent = "Ansyen modpas la pa kòrèk.";
                msg.className = "error";
                return;
            }

            // Verify new password match
            if (newPass !== confirmPass) {
                msg.textContent = "Nouvo modpas yo pa menm.";
                msg.className = "error";
                return;
            }

            // Verify new password length
            if (newPass.length < 4) {
                msg.textContent = "Nouvo modpas la dwe gen omwen 4 karaktè.";
                msg.className = "error";
                return;
            }

            // SUCCESS
            msg.textContent = "Modpas chanje avèk siksè!";
            msg.className = "success";

            // Redirect after success
            setTimeout(() => {
                window.location.href = "login.html";
            }, 1500);
        }
    </script>

</body>
</html>
