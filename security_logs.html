<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BSS1815 • SECURITY LOGS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    body{
      min-height:100vh;
      background:#000;
      color:#ff7a00;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:20px;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at top,#ff7a00 0,transparent 55%),
        radial-gradient(circle at bottom,#ff7a00 0,transparent 55%);
      opacity:0.12;
      pointer-events:none;
      z-index:-2;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:linear-gradient(135deg,rgba(0,0,0,0.9),rgba(0,0,0,0.98));
      z-index:-1;
    }

    .header{
      width:100%;
      max-width:1100px;
      padding:14px 16px;
      border-radius:14px;
      border:2px solid #ff7a00;
      box-shadow:0 0 26px #ff7a00;
      background:rgba(0,0,0,0.9);
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .header-left{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .logo-box{
      width:54px;
      height:54px;
      border-radius:14px;
      background:linear-gradient(135deg,#ff7a00,#000);
      box-shadow:0 0 25px #ff7a00;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
      font-size:20px;
    }

    .header-text{
      display:flex;
      flex-direction:column;
      gap:2px;
    }

    .header-text span:first-child{
      font-size:17px;
      font-weight:800;
      letter-spacing:1px;
    }

    .header-text span:last-child{
      font-size:11px;
      text-transform:uppercase;
      opacity:0.85;
    }

    .mode-pill{
      padding:5px 11px;
      border-radius:999px;
      border:1px solid #ff7a00;
      font-size:10px;
      text-transform:uppercase;
      opacity:0.9;
    }

    .status-dot{
      width:9px;
      height:9px;
      border-radius:50%;
      background:#00ff66;
      box-shadow:0 0 12px #00ff66;
      display:inline-block;
      margin-right:5px;
      animation:statusPulse 1.4s infinite;
    }

    .container{
      width:100%;
      max-width:1100px;
      display:grid;
      grid-template-columns:1fr;
      gap:18px;
    }

    .section{
      background:rgba(0,0,0,0.9);
      border-radius:14px;
      border:2px solid #ff7a00;
      box-shadow:0 0 26px #ff7a00;
      padding:16px;
      position:relative;
      overflow:hidden;
    }

    .section::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg,rgba(255,122,0,0.18),transparent);
      opacity:0.4;
      pointer-events:none;
    }

    .section-inner{
      position:relative;
      z-index:1;
    }

    .section-title{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:12px;
    }

    .section-title h2{
      font-size:18px;
      text-shadow:0 0 10px #ff7a00;
    }

    .section-tag{
      font-size:10px;
      text-transform:uppercase;
      border-radius:999px;
      border:1px solid #ff7a00;
      padding:3px 8px;
      opacity:0.85;
    }

    .log-list{
      margin-top:10px;
      max-height:500px;
      overflow-y:auto;
      display:flex;
      flex-direction:column;
      gap:8px;
      padding-right:6px;
      font-size:11px;
    }

    .log-item{
      background:rgba(255,122,0,0.08);
      border-left:3px solid #ff7a00;
      padding:8px 9px;
      border-radius:8px;
      box-shadow:0 0 12px #ff7a00;
      display:flex;
      justify-content:space-between;
      gap:8px;
    }

    .log-main{
      display:flex;
      flex-direction:column;
      gap:2px;
    }

    .log-meta{
      font-size:9px;
      opacity:0.85;
    }

    .log-tag{
      font-size:9px;
      padding:2px 7px;
      border-radius:999px;
      border:1px solid #ff7a00;
      text-transform:uppercase;
    }

    .footer{
      width:100%;
      max-width:1100px;
      margin-top:14px;
      font-size:9px;
      opacity:0.75;
      text-align:center;
    }

    .footer span{
      font-weight:800;
    }

    @keyframes statusPulse{
      0%,100%{transform:scale(1);}
      50%{transform:scale(1.25);}
    }

    ::-webkit-scrollbar{
      width:6px;
    }
    ::-webkit-scrollbar-track{
      background:#000;
    }
    ::-webkit-scrollbar-thumb{
      background:#ff7a00;
      border-radius:999px;
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-left">
      <div class="logo-box">SL</div>
      <div class="header-text">
        <span>BSS1815 • SECURITY LOGS</span>
        <span>Forensic audit • Real‑time tracking</span>
      </div>
    </div>
    <div class="mode-pill">
      <span class="status-dot"></span>
      LIVE SECURITY CHANNEL
    </div>
  </header>

  <main class="container">

    <section class="section">
      <div class="section-inner">
        <div class="section-title">
          <h2>🛡 FORENSIC SECURITY LOGS</h2>
          <div class="section-tag">Tamper‑proof • Real‑time</div>
        </div>

        <div class="log-list" id="logList">
          <!-- Logs will appear here -->
        </div>
      </div>
    </section>

  </main>

  <div class="footer">
    All logs are monitored by <span>SUPER_ADMIN</span> and stored under <span>BSS1815</span> forensic protocol.
  </div>

  <script>
    function addLog(message, tag="SYSTEM"){
      const list = document.getElementById("logList");

      const item = document.createElement("div");
      item.className = "log-item";

      const main = document.createElement("div");
      main.className = "log-main";

      const msg = document.createElement("div");
      msg.textContent = message;

      const meta = document.createElement("div");
      meta.className = "log-meta";
      meta.textContent = new Date().toLocaleString();

      main.appendChild(msg);
      main.appendChild(meta);

      const right = document.createElement("div");
      const tagEl = document.createElement("div");
      tagEl.className = "log-tag";
      tagEl.textContent = tag;

      right.appendChild(tagEl);

      item.appendChild(main);
      item.appendChild(right);

      list.prepend(item);
    }

    // Initial log
    addLog("Security log session started.", "SESSION");
  </script>

</body>
</html>
