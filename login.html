<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSS1815 — LOGIN PRO‑MAX</title>

    <style>
        :root {
            --abriko: #FF7A00;
            --nwa: #000000;
            --blan: #FFFFFF;
        }

        body {
            margin: 0;
            background: linear-gradient(to bottom right, #FF7A00, #000000);
            color: var(--blan);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            width: 100%;
            max-width: 420px;
            background: #111;
            padding: 30px;
            border-radius: 14px;
            border: 2px solid var(--abriko);
            box-shadow: 0 0 25px rgba(255,120,0,0.6);
        }

        .logo-zone {
            text-align: left;
            margin-bottom: 20px;
        }

        .logo-zone img {
            width: 120px;
            filter: drop-shadow(0 0 10px var(--abriko));
        }

        h2 {
            text-align: center;
            color: var(--abriko);
            font-size: 26px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .field {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid var(--abriko);
            background: #000;
            color: #FFF;
            font-size: 15px;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--abriko);
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            color: #000;
            margin-top: 10px;
        }

        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            min-height: 20px;
        }
    </style>
</head>

<body>

<div class="login-box">

    <div class="logo-zone">
        <img src="/PATH/logo-bss2.jpeg" alt="BSS1815 Logo">
    </div>

    <h2>LOGIN ADMIN — BSS1815</h2>

    <input type="text" id="username" class="field" placeholder="Non itilizatè">
    <input type="password" id="password" class="field" placeholder="Modpas">

    <button class="btn-login" onclick="login()">Konekte</button>

    <div id="errorMsg" class="error"></div>

</div>

<script>
    function login() {
        const user = document.getElementById("username").value.trim();
        const pass = document.getElementById("password").value.trim();
        const error = document.getElementById("errorMsg");

        const ADMIN_USER = "superadmin";
        const ADMIN_PASS = "1815";

        if (user === ADMIN_USER && pass === ADMIN_PASS) {
            localStorage.setItem("bss_admin_logged", "yes");
            window.location.href = "admin.html";
        } else {
            error.textContent = "Enfòmasyon yo pa kòrèk.";
        }
    }
</script>

</body>
</html>
