<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSS1815 — LOGIN ADMIN</title>

    <style>
        :root {
            --abriko: #FF7A00;
            --nwa: #000000;
            --nwa-soft: #1A1A1A;
            --blan: #FFFFFF;
        }

        body {
            margin: 0;
            background: var(--nwa);
            color: var(--blan);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: var(--nwa-soft);
            padding: 40px;
            width: 350px;
            border-radius: 10px;
            border: 2px solid var(--abriko);
            box-shadow: 0 0 20px var(--abriko);
            text-align: center;
        }

        .login-logo {
            width: 180px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px var(--abriko));
        }

        h2 {
            color: var(--abriko);
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border-radius: 6px;
            border: 1px solid var(--abriko);
            background: #111;
            color: var(--blan);
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--abriko);
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #ff9a3d;
        }

        .error {
            color: red;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <img src="/PATH/logo-bss2.jpeg" class="login-logo">

        <h2>ADMIN LOGIN</h2>

        <input type="password" id="admin-pass" placeholder="Antre modpas admin">
        <button onclick="loginAdmin()">Login</button>

        <div class="error" id="error-msg">Modpas la pa bon</div>
    </div>

    <script>
        function loginAdmin() {
            const pass = document.getElementById("admin-pass").value;

            // MODPAS OFISYÈL ADMIN NAN
            const correctPass = "BSS1815-PROMAX";

            if (pass === correctPass) {
                localStorage.setItem("bss_admin_logged", "true");
                window.location.href = "admin.html";
            } else {
                document.getElementById("error-msg").style.display = "block";
            }
        }
    </script>

</body>
</html>
