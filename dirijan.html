<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <title>Dirijan BSS 1815</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom, #ffa64d, #000);
      color: #ffa64d;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow-x: hidden;
    }

    /* HEADER */
    .header-area {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 40px;
    }

    /* LOGO GAUCHE — ROTATE IN */
    .logo {
      width: 140px;
      opacity: 0;
      transform: rotate(-180deg) scale(0.3);
      animation: spinIn 1.6s ease-out forwards;
    }

    @keyframes spinIn {
      0% { opacity: 0; transform: rotate(-180deg) scale(0.3); }
      70% { opacity: 1; transform: rotate(10deg) scale(1.1); }
      100% { transform: rotate(0deg) scale(1); }
    }

    /* KOUKOU DWAT — FLY IN */
    .koukou {
      width: 140px;
      opacity: 0;
      transform: translateX(200px) translateY(-40px);
      animation: flyIn 1.8s ease-out forwards;
      animation-delay: 0.3s;
    }

    @keyframes flyIn {
      0% { opacity: 0; transform: translateX(200px) translateY(-40px); }
      60% { opacity: 1; transform: translateX(-20px) translateY(0px); }
      100% { transform: translateX(0px); }
    }

    /* SLIDESHOW */
    .slideshow {
      width: 90%;
      max-width: 500px;
      margin: 20px auto;
      overflow: hidden;
      border-radius: 10px;
      border: 3px solid #ffa64d;
    }

    .slides {
      display: flex;
      width: 400%;
      animation: slideShow 12s infinite;
    }

    .slides img {
      width: 100%;
      height: auto;
    }

    @keyframes slideShow {
      0% { transform: translateX(0%); }
      20% { transform: translateX(0%); }
      25% { transform: translateX(-100%); }
      45% { transform: translateX(-100%); }
      50% { transform: translateX(-200%); }
      70% { transform: translateX(-200%); }
      75% { transform: translateX(-300%); }
      100% { transform: translateX(-300%); }
    }

    /* GRID DIRIJAN YO */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      padding: 20px;
      width: 90%;
      margin: auto;
    }

    .card {
      background: rgba(0,0,0,0.4);
      padding: 15px;
      border-radius: 10px;
      border: 2px solid #ffa64d;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
      border: 2px solid #ffa64d;
    }

    .card h3 {
      margin: 10px 0 5px;
      color: #ffa64d;
    }

    .card p {
      margin: 0;
      color: #ffbb77;
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      font-size: 14px;
      color: #ffbb77;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header-area">
    <img src="bss-logo.png" class="logo" alt="Logo BSS 1815">
    <img src="koukou-mekontan.jpeg" class="koukou" alt="Koukou BSS">
  </div>

  <h1>DIRIJAN BSS 1815</h1>
  <h2>Ekip ki mennen BSS 1815 avanse</h2>

  <!-- SLIDESHOW -->
  <div class="slideshow">
    <div class="slides">
      <img src="dirijan-1.jpeg" alt="">
      <img src="dirijan-3.jpg" alt="">
      <img src="dirijan-images.png" alt="">
      <img src="dirijan-maximax.jpg" alt="">
    </div>
  </div>

  <!-- GRID DIRIJAN YO -->
  <div class="grid">

    <div class="card">
      <img src="dirijan-1.jpeg">
      <h3>NON DIRIJAN</h3>
      <p>TIT DIRIJAN</p>
    </div>

    <div class="card">
      <img src="dirijan-3.jpg">
      <h3>NON DIRIJAN</h3>
      <p>TIT DIRIJAN</p>
    </div>

    <div class="card">
      <img src="dirijan-images.png">
      <h3>NON DIRIJAN</h3>
      <p>TIT DIRIJAN</p>
    </div>

    <div class="card">
      <img src="dirijan-maximax.jpg">
      <h3>NON DIRIJAN</h3>
      <p>TIT DIRIJAN</p>
    </div>

  </div>

  <footer>
    © BSS 1815 — Tout dwa rezève.
  </footer>

</body>
</html>
