<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSS1815 — OFFICIAL STORE PRO‑MAX</title>

    <style>
        :root {
            --abriko: #FF7A00;
            --nwa: #000000;
            --blan: #FFFFFF;
        }

        body {
            margin: 0;
            background: var(--nwa);
            color: var(--blan);
            font-family: Arial, sans-serif;
        }

        /* HEADER */
        header {
            background: linear-gradient(to right, #FF7A00, #000000);
            padding: 20px;
            display: flex;
            align-items: center;
            border-bottom: 2px solid #FF7A00;
            box-shadow: 0 0 20px rgba(255,120,0,0.6);
        }

        header img {
            width: 120px;
            filter: drop-shadow(0 0 10px #FF7A00);
            margin-right: 20px;
        }

        header h1 {
            font-size: 32px;
            color: #FF7A00;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* MAIN */
        .section {
            padding: 50px 20px;
            max-width: 1300px;
            margin: auto;
        }

        .title-main {
            font-size: 34px;
            color: #FF7A00;
            text-align: center;
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .subtitle {
            text-align: center;
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 35px;
        }

        /* GRID PRODUCTS */
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #FF7A00;
            box-shadow: 0 0 20px rgba(255,120,0,0.4);
            text-align: center;
        }

        .product-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-bottom: 2px solid #FF7A00;
        }

        .product-card h3 {
            color: #FF7A00;
            font-size: 20px;
            margin: 12px 0 6px 0;
        }

        .price {
            font-size: 18px;
            font-weight: bold;
            color: #FF7A00;
            margin-bottom: 10px;
        }

        .btn {
            width: 90%;
            padding: 12px;
            background: #FF7A00;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            color: #000;
            margin-bottom: 12px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #000;
            color: #FF7A00;
            border: 2px solid #FF7A00;
        }

        footer {
            background: #000;
            padding: 25px;
            text-align: center;
            border-top: 2px solid #FF7A00;
            margin-top: 40px;
        }

        footer p {
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header>
        <img src="/PATH/logo-bss2.jpeg" alt="BSS1815 Logo">
        <h1>BSS1815 OFFICIAL STORE</h1>
    </header>

    <!-- MAIN CONTENT -->
    <section class="section">

        <div class="title-main">PRO‑MAX STORE</div>
        <div class="subtitle">Pwodwi ofisyèl BSS1815 yo — kalite, style, idantite.</div>

        <div class="grid-3">

            <div class="product-card">
                <img src="/PATH/store/tshirt.jpg">
                <h3>T‑SHIRT OFISYÈL</h3>
                <div class="price">$25.00</div>
                <button class="btn">Add to Cart</button>
                <button class="btn">View Details</button>
            </div>

            <div class="product-card">
                <img src="/PATH/store/hoodie.jpg">
                <h3>HOODIE PRO‑MAX</h3>
                <div class="price">$45.00</div>
                <button class="btn">Add to Cart</button>
                <button class="btn">View Details</button>
            </div>

            <div class="product-card">
                <img src="/PATH/store/hat.jpg">
                <h3>CHAPO OFISYÈL</h3>
                <div class="price">$20.00</div>
                <button class="btn">Add to Cart</button>
                <button class="btn">View Details</button>
            </div>

            <div class="product-card">
                <img src="/PATH/store/bandana.jpg">
                <h3>BANDANA BSS1815</h3>
                <div class="price">$15.00</div>
                <button class="btn">Add to Cart</button>
                <button class="btn">View Details</button>
            </div>

            <div class="product-card">
                <img src="/PATH/store/limited.jpg">
                <h3>LIMITED EDITION</h3>
                <div class="price">$60.00</div>
                <button class="btn">Add to Cart</button>
                <button class="btn">View Details</button>
            </div>

            <div class="product-card">
                <img src="/PATH/store/fanclub.jpg">
                <h3>5 STARS FANCLUB KIT</h3>
                <div class="price">$75.00</div>
                <button class="btn">Add to Cart</button>
                <button class="btn">View Details</button>
            </div>

        </div>

    </section>

    <!-- FOOTER -->
    <footer>
        <p>BSS1815 © 2026 — OFFICIAL STORE — PRO‑MAX Edition.</p>
    </footer>

</body>
</html>
