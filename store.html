  <style>
    body {
      background: #000;
      padding: 20px;
      text-align: center;
    }

    .store-title {
      font-size: 32px;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 25px;
      color: #ff9b3b;
      text-shadow: 0 0 15px #ff7a00;
    }

    .store-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 25px;
      margin-top: 20px;
    }

    .product-card {
      background: linear-gradient(180deg, #1a1a1a 0%, #000 60%, #ff7a00 100%);
      border: 2px solid #ff9b3b;
      border-radius: 14px;
      padding: 15px;
      box-shadow: 0 0 25px rgba(255, 122, 0, 0.35);
      transition: 0.2s;
    }

    .product-card:hover {
      transform: scale(1.03);
      box-shadow: 0 0 35px rgba(255, 122, 0, 0.55);
    }

    .product-img {
      width: 100%;
      height: 180px;
      background: #111;
      border-radius: 10px;
      border: 2px solid #ff9b3b;
      margin-bottom: 12px;
    }

    .product-name {
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 8px;
      color: #ff9b3b;
    }

    .product-price {
      font-weight: 700;
      color: #ffb56b;
      margin-bottom: 12px;
    }

    .btn-buy {
      display: block;
      width: 100%;
      padding: 12px;
      background: linear-gradient(90deg, #ff9b3b, #ff6a00);
      color: #000;
      font-weight: 900;
      border-radius: 10px;
      border: 2px solid #ff9b3b;
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-buy:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(255, 122, 0, 0.75);
    }
  </style>
</head>
