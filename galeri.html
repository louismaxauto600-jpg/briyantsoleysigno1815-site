<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSS1815 — GALERY PRO‑MAX</title>

    <style>
        :root {
            --abriko: #FF7A00;
            --nwa: #000000;
            --nwa-soft: #1A1A1A;
            --blan: #FFFFFF;
        }

        body {
            margin: 0;
            background: var(--nwa);
            color: var(--blan);
            font-family: Arial, sans-serif;
        }

        .wrap {
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .shell {
            width: 100%;
            max-width: 1200px;
            background: linear-gradient(to bottom right, #FF7A00, #000000);
            padding: 30px;
            border-radius: 16px;
            border: 2px solid #FF7A00;
            box-shadow: 0 0 30px rgba(255,120,0,0.7);
        }

        .logo-zone {
            text-align: left;
            margin-bottom: 20px;
        }

        .logo-zone img {
            width: 120px;
            filter: drop-shadow(0 0 10px #FF7A00);
        }

        .title-main {
            color: #FF7A00;
            font-size: 32px;
            text-align: center;
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .subtitle {
            text-align: center;
            font-size: 15px;
            opacity: 0.9;
            margin-bottom: 25px;
        }

        .inner {
            background: #111;
            padding: 25px;
            border-radius: 12px;
            border: 2px solid #FF7A00;
            box-shadow: 0 0 18px rgba(255,120,0,0.5);
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 22px;
        }

        .photo-card {
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #FF7A00;
            box-shadow: 0 0 15px rgba(255,120,0,0.4);
        }

        .photo-card img {
            width: 100%;
            height: 240px;
            object-fit: cover;
        }

        .photo-info {
            padding: 12px;
            text-align: center;
        }

        .photo-info h3 {
            color: #FF7A00;
            margin-bottom: 6px;
            font-size: 16px;
        }

        .photo-info p {
            font-size: 13px;
            opacity: 0.85;
        }

        @media (max-width: 768px) {
            .shell {
                padding: 20px;
            }
        }
    </style>
</head>

<body>

<div class="wrap">
    <div class="shell">

        <div class="logo-zone">
            <img src="/PATH/logo-bss2.jpeg" alt="BSS1815 Logo">
        </div>

        <div class="title-main">GALERI OFISYÈL — BSS1815 PRO‑MAX</div>
        <div class="subtitle">
            Koleksyon foto ofisyèl BSS1815 yo, tout ak style PRO‑MAX: logo agoch, background abriko + nwa fade.
        </div>

        <div class="inner">
            <div class="grid-4">

                <div class="photo-card">
                    <img src="/PATH/gallery/g1.jpg">
                    <div class="photo-info">
                        <h3>Foto #1</h3>
                        <p>Evènman ofisyèl BSS1815.</p>
                    </div>
                </div>

                <div class="photo-card">
                    <img src="/PATH/gallery/g2.jpg">
                    <div class="photo-info">
                        <h3>Foto #2</h3>
                        <p>Momant espesyal ekip la.</p>
                    </div>
                </div>

                <div class="photo-card">
                    <img src="/PATH/gallery/g3.jpg">
                    <div class="photo-info">
                        <h3>Foto #3</h3>
                        <p>Parad ak misyon ofisyèl.</p>
                    </div>
                </div>

                <div class="photo-card">
                    <img src="/PATH/gallery/g4.jpg">
                    <div class="photo-info">
                        <h3>Foto #4</h3>
                        <p>Selebrasyon ak fanatik yo.</p>
                    </div>
                </div>

            </div>
        </div>

    </div>
</div>

</body>
</html>
