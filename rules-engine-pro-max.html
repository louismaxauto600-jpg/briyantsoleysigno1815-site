<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8" />
  <title>Rules Engine – BSS1815 PRO‑MAX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="ui-ux-pro-max-final.css" />
</head>
<body>

  <div id="globalLoader" class="loader loader-hidden"></div>

  <div class="app-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="logo-bss1815.png" />
        <span>BSS1815 ADMIN</span>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard-pro-max.html" class="sidebar-link">📊 Dashboard</a>
        <a href="audit-log-pro-max.html" class="sidebar-link">📜 Audit Logs</a>
        <a href="reports-pro-max.html" class="sidebar-link">📑 Rapò</a>
        <a href="role-manager-pro-max.html" class="sidebar-link">🛡️ Wòl</a>
        <a href="backup-restore-pro-max.html" class="sidebar-link">💾 Backup / Restore</a>
        <a href="media-manager-pro-max.html" class="sidebar-link">🖼️ Media</a>
        <a href="settings-pro-max.html" class="sidebar-link">⚙️ Paramèt</a>
        <a href="logs-cleaner-pro-max.html" class="sidebar-link">🧹 Logs Cleaner</a>
        <a href="messaging-center-pro-max.html" class="sidebar-link">💬 Messaging</a>
        <a href="system-monitor-pro-max.html" class="sidebar-link">🖥️ System Monitor</a>
        <a href="notification-engine-pro-max.html" class="sidebar-link">🔔 Notifications</a>
        <a href="deploy-config-pro-max.html" class="sidebar-link">🚀 Deploy Config</a>
        <a href="rules-engine-pro-max.html" class="sidebar-link active">⚡ Rules Engine</a>
      </nav>
    </aside>

    <!-- MAIN -->
    <main class="app-main">

      <header class="app-header">
        <div class="app-title">Rules Engine</div>

        <div class="app-header-right">
          <span id="userName"></span>
          <span id="roleChip" class="chip-role">ROLE</span>
          <button id="logoutBtn" class="btn-logout">Dekonekte</button>
        </div>
      </header>

      <section class="app-content">

        <!-- CREATE RULE -->
        <div class="card" style="margin-bottom:20px;">
          <div class="card-title">Kreye yon Règ</div>

          <select id="ruleEvent" class="input">
            <option value="FIREWALL_TAMPER">Firewall Tampering</option>
            <option value="BACKUP_CREATED">Backup Created</option>
            <option value="ROLE_CHANGED">Role Changed</option>
            <option value="VIDEO_UPLOADED">Video Uploaded</option>
            <option value="ERROR_SPIKE">Error Spike</option>
          </select>

          <select id="ruleAction" class="input">
            <option value="SEND_NOTIFICATION">Voye Notifikasyon</option>
            <option value="SEND_MESSAGE">Voye Mesaj</option>
            <option value="ENABLE_SAFE_MODE">Aktive Safe Mode</option>
            <option value="LOG_EVENT">Log Event</option>
          </select>

          <input id="ruleValue" class="input" placeholder="Valè (opsyonèl)" />

          <button id="createRuleBtn" class="btn-primary" style="margin-top:10px;">
            Kreye Règ
          </button>
        </div>

        <!-- RULE LIST -->
        <div class="card">
          <div class="card-title">Lis Règ yo</div>
          <div id="ruleList" class="list"></div>
        </div>

      </section>

    </main>

  </div>

  <script type="module" src="ui-ux-pro-max-final.js"></script>
  <script type="module" src="system-kernel-pro-max.js"></script>
  <script type="module" src="rules-engine-pro-max.js"></script>

</body>
</html>
