<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSS1815 — Jere Mizisyen yo</title>

    <style>
        :root {
            --abriko: #FF7A00;
            --jòn: #FFD400;
            --nwa: #000000;
            --nwa-soft: #1A1A1A;
            --blan: #FFFFFF;
        }

        body {
            margin: 0;
            background: var(--nwa);
            color: var(--blan);
            font-family: Arial, sans-serif;
        }

        /* HEADER */
        .bss-header {
            background: var(--nwa);
            padding: 15px 30px;
            border-bottom: 2px solid var(--abriko);
        }

        .bss-header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .bss-logo {
            width: 220px;
            height: auto;
            filter: drop-shadow(0 0 10px var(--abriko));
        }

        /* CONTAINER */
        .page-container {
            max-width: 900px;
            margin: 40px auto;
            background: var(--nwa-soft);
            padding: 30px;
            border-radius: 10px;
            border: 2px solid var(--abriko);
            box-shadow: 0 0 20px var(--abriko);
        }

        h1 {
            text-align: center;
            color: var(--abriko);
            margin-bottom: 20px;
        }

        /* FORM */
        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            border: none;
            outline: none;
            background: #2a2a2a;
            color: var(--blan);
            font-size: 16px;
        }

        .add-btn {
            background: var(--abriko);
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            color: var(--blan);
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .add-btn:hover {
            background: var(--jòn);
            color: var(--nwa);
        }

        /* LIST */
        .musician-list {
            margin-top: 20px;
        }

        .musician-item {
            background: #1c1c1c;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 4px solid var(--abriko);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delete-btn {
            background: red;
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .delete-btn:hover {
            background: #ff4444;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header class="bss-header">
        <div class="bss-header-inner">
            <img src="/PATH/logo-bss2.jpeg" class="bss-logo">
        </div>
    </header>

    <!-- PAGE CONTENT -->
    <div class="page-container">
        <h1>Jere Mizisyen yo</h1>

        <!-- ADD MUSICIAN -->
        <div class="input-row">
            <input type="text" id="musicianName" placeholder="Non mizisyen an">
            <button class="add-btn" onclick="addMusician()">Ajoute</button>
        </div>

        <!-- LIST -->
        <div class="musician-list" id="musicianList"></div>
    </div>

    <script>
        // Load existing musicians
        function loadMusicians() {
            const data = JSON.parse(localStorage.getItem("bss_musicians") || "[]");
            const list = document.getElementById("musicianList");
            list.innerHTML = "";

            data.forEach((name, index) => {
                const item = document.createElement("div");
                item.className = "musician-item";
                item.innerHTML = `
                    <span>${name}</span>
                    <button class="delete-btn" onclick="deleteMusician(${index})">Efase</button>
                `;
                list.appendChild(item);
            });
        }

        // Add musician
        function addMusician() {
            const name = document.getElementById("musicianName").value.trim();
            if (name === "") return alert("Antre non mizisyen an!");

            const data = JSON.parse(localStorage.getItem("bss_musicians") || "[]");
            data.push(name);
            localStorage.setItem("bss_musicians", JSON.stringify(data));

            document.getElementById("musicianName").value = "";
            loadMusicians();
        }

        // Delete musician
        function deleteMusician(index) {
            const data = JSON.parse(localStorage.getItem("bss_musicians") || "[]");
            data.splice(index, 1);
            localStorage.setItem("bss_musicians", JSON.stringify(data));
            loadMusicians();
        }

        loadMusicians();
    </script>

</body>
</html>
