<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSS1815 — BSS1815-TV PRO‑MAX</title>

    <style>
        :root {
            --abriko: #FF7A00;
            --nwa: #000000;
            --blan: #FFFFFF;
        }

        body {
            margin: 0;
            background: var(--nwa);
            color: var(--blan);
            font-family: Arial, sans-serif;
        }

        .wrap {
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .shell {
            width: 100%;
            max-width: 1200px;
            background: linear-gradient(to bottom right, #FF7A00, #000000);
            padding: 30px;
            border-radius: 16px;
            border: 2px solid #FF7A00;
            box-shadow: 0 0 30px rgba(255,120,0,0.7);
        }

        .logo-zone img {
            width: 120px;
            filter: drop-shadow(0 0 10px #FF7A00);
        }

        .title-main {
            color: #FF7A00;
            font-size: 32px;
            text-align: center;
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .subtitle {
            text-align: center;
            font-size: 15px;
            opacity: 0.9;
            margin-bottom: 25px;
        }

        .inner {
            background: #111;
            padding: 25px;
            border-radius: 12px;
            border: 2px solid #FF7A00;
            box-shadow: 0 0 18px rgba(255,120,0,0.5);
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .video-card {
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #FF7A00;
            box-shadow: 0 0 15px rgba(255,120,0,0.4);
        }

        .video-card iframe {
            width: 100%;
            height: 220px;
            border: none;
        }

        .video-info {
            padding: 12px;
            text-align: center;
        }

        .video-info h3 {
            color: #FF7A00;
            margin-bottom: 6px;
            font-size: 18px;
        }

        .video-info p {
            font-size: 14px;
            opacity: 0.85;
        }

        .upload-box {
            margin-top: 30px;
            padding: 20px;
            background: #000;
            border-radius: 12px;
            border: 2px solid #FF7A00;
        }

        .upload-box h2 {
            color: #FF7A00;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-size: 20px;
        }

        .field {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #FF7A00;
            background: #000;
            color: #FFF;
            font-size: 14px;
        }

        .btn-upload {
            width: 100%;
            padding: 12px;
            background: #FF7A00;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            color: #000;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="wrap">
    <div class="shell">

        <div class="logo-zone">
            <img src="/PATH/logo-bss2.jpeg" alt="BSS1815 Logo">
        </div>

        <div class="title-main">BSS1815-TV — PRO‑MAX</div>
        <div class="subtitle">
            Sant videyo ofisyèl BSS1815: parad, repètisyon, evènman, dokimantè, ak selebrasyon fanatik yo.
        </div>

        <div class="inner">

            <div class="grid-3">

                <div class="video-card">
                    <iframe src="https://www.youtube.com/embed/VIDEO_ID_1"></iframe>
                    <div class="video-info">
                        <h3>Videyo #1</h3>
                        <p>Evènman ofisyèl BSS1815.</p>
                    </div>
                </div>

                <div class="video-card">
                    <iframe src="https://www.youtube.com/embed/VIDEO_ID_2"></iframe>
                    <div class="video-info">
                        <h3>Videyo #2</h3>
                        <p>Repètisyon ekip la.</p>
                    </div>
                </div>

                <div class="video-card">
                    <iframe src="https://www.youtube.com/embed/VIDEO_ID_3"></iframe>
                    <div class="video-info">
                        <h3>Videyo #3</h3>
                        <p>Selebrasyon ak fanatik yo.</p>
                    </div>
                </div>

            </div>

            <div class="upload-box">
                <h2>Ajoute Nouvo Videyo</h2>

                <input type="text" class="field" placeholder="Tit videyo a">
                <input type="text" class="field" placeholder="URL YouTube videyo a">
                <button class="btn-upload">Ajoute Videyo</button>
            </div>

        </div>

    </div>
</div>

</body>
</html>
