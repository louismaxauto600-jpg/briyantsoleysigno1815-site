<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Badj Ti Machann - BSS 1815</title>

    :root {
      --orange: #f4a460;
      --orange-dark: #d88432;
      --black: #070707;
      --white: #ffffff;
      --gray: #e9e9e9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f2f2f2;
      color: #111;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .badge-sheet {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
      max-width: 1000px;
      width: 100%;
    }

    .badge {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      background: linear-gradient(180deg, var(--black) 0%, #141414 45%, var(--orange-dark) 100%);
      color: var(--white);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 14px 30px rgba(0,0,0,0.25);
      border: 3px solid var(--orange);
    }
