<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8" />
  <title>BSS1815 – Super Fanclub</title>
  <style>
    :root {
      --bss-orange: #ff7a00;
      --bss-black: #050505;
    }

    body {
      background: #000;
      color: #fff;
      margin: 0;
      padding: 0;
      font-family: system-ui, sans-serif;
    }

    header {
      text-align: center;
      padding: 40px 16px 20px;
      background: linear-gradient(180deg, #1a0a00, #000);
      border-bottom: 1px solid rgba(255, 122, 0, 0.4);
    }

    header h1 {
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--bss-orange);
      font-size: 2rem;
    }

    header p {
      margin-top: 6px;
      font-size: 0.8rem;
      letter-spacing: 0.16em;
      color: #bbbbbb;
    }

    .badge {
      width: 260px;
      height: auto;
      margin: 30px auto;
      display: block;
      border-radius: 14px;
      box-shadow: 0 0 25px rgba(255, 122, 0, 0.6);
    }

    .section {
      padding: 20px 16px 40px;
      max-width: 900px;
      margin: auto;
    }

    .section h2 {
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--bss-orange);
      margin-bottom: 14px;
      font-size: 1.2rem;
    }

    .members {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 20px;
    }

    .member-card {
      background: #0a0a0a;
      border: 1px solid rgba(255, 122, 0, 0.3);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
      box-shadow: 0 0 18px rgba(255, 122, 0, 0.25);
    }

    .member-card img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 10px;
      border: 1px solid rgba(255, 122, 0, 0.4);
    }

    .member-card .name {
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.14em;
      color: #fff;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.7rem;
      letter-spacing: 0.16em;
      color: #777;
      border-top: 1px solid rgba(255, 122, 0, 0.3);
      margin-top: 40px;
    }

    footer span {
      color: var(--bss-orange);
    }
  </style>
</head>
<body>

<header>
  <h1>Super Fanclub</h1>
  <p>BSS1815 • Team Ofisyèl</p>
</header>

<img src="badges/bss-super-fanclub-5stars.png" class="badge" />

<section class="section">
  <h2>Manm Ofisyèl</h2>

  <div class="members">
    <!-- OU AJOUTE MANM YO ISIT -->
    <div class="member-card">
      <img src="members/sample.jpg" />
      <div class="name">Non Manm</div>
    </div>
  </div>
</section>

<footer>
  BSS1815 © <span>SUPER ADMIN: MAX</span>
</footer>

</body>
</html>
