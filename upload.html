<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSS1815 — UPLOAD CENTER PRO‑MAX</title>

    <style>
        :root {
            --abriko: #FF7A00;
            --nwa: #000000;
            --blan: #FFFFFF;
        }

        body {
            margin: 0;
            background: var(--nwa);
            color: var(--blan);
            font-family: Arial, sans-serif;
        }

        .wrap {
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .shell {
            width: 100%;
            max-width: 900px;
            background: linear-gradient(to bottom right, #FF7A00, #000000);
            padding: 30px;
            border-radius: 16px;
            border: 2px solid #FF7A00;
            box-shadow: 0 0 30px rgba(255,120,0,0.7);
        }

        .logo-zone {
            text-align: left;
            margin-bottom: 20px;
        }

        .logo-zone img {
            width: 120px;
            filter: drop-shadow(0 0 10px #FF7A00);
        }

        .title-main {
            color: #FF7A00;
            font-size: 32px;
            text-align: center;
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .subtitle {
            text-align: center;
            font-size: 15px;
            opacity: 0.9;
            margin-bottom: 25px;
        }

        .inner {
            background: #111;
            padding: 25px;
            border-radius: 12px;
            border: 2px solid #FF7A00;
            box-shadow: 0 0 18px rgba(255,120,0,0.5);
        }

        .field {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #FF7A00;
            background: #000;
            color: #FFF;
            font-size: 15px;
        }

        .btn-upload {
            width: 100%;
            padding: 12px;
            background: #FF7A00;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            color: #000;
            margin-top: 10px;
        }

        .file-list {
            margin-top: 25px;
            padding: 15px;
            background: #000;
            border-radius: 10px;
            border: 1px solid #FF7A00;
        }

        .file-item {
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 14px;
        }

        .file-item:last-child {
            border-bottom: none;
        }
    </style>
</head>

<body>

<div class="wrap">
    <div class="shell">

        <div class="logo-zone">
            <img src="/PATH/logo-bss2.jpeg" alt="BSS1815 Logo">
        </div>

        <div class="title-main">UPLOAD CENTER — BSS1815 PRO‑MAX</div>
        <div class="subtitle">
            Telechaje foto, flyer, lèt, kontra, mizisyen, ak tout dokiman PRO‑MAX BSS1815 yo.
        </div>

        <div class="inner">

            <input type="file" id="fileInput" class="field" multiple>

            <button class="btn-upload" onclick="uploadFiles()">Upload</button>

            <div id="fileList" class="file-list" style="display:none;"></div>

        </div>

    </div>
</div>

<script>
    function uploadFiles() {
        const input = document.getElementById("fileInput");
        const list = document.getElementById("fileList");

        if (input.files.length === 0) {
            alert("Chwazi omwen yon fichye.");
            return;
        }

        list.innerHTML = "";
        list.style.display = "block";

        for (let i = 0; i < input.files.length; i++) {
            const f = input.files[i];
            const item = document.createElement("div");
            item.className = "file-item";
            item.textContent = "✔ " + f.name + " — Uploaded (simulated)";
            list.appendChild(item);
        }
    }
</script>

</body>
</html>
