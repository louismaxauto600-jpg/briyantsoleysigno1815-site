<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <title>BSS1815 — BRANDING PRO‑MAX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif;}

    body{
      background:#050505;
      color:#f7f2ec;
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    header{
      padding:20px;
      border-bottom:1px solid #2b2b2b;
      background:#0a0a0a;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    header h1{
      font-size:22px;
      color:#ff9b3b;
      text-transform:uppercase;
      letter-spacing:2px;
    }

    header span{
      font-size:12px;
      color:#ff9b3b;
      border:1px solid #ff9b3b55;
      padding:4px 10px;
      border-radius:999px;
      text-transform:uppercase;
    }

    main{
      padding:25px;
      flex:1;
    }

    h2{
      font-size:18px;
      margin-bottom:10px;
      text-transform:uppercase;
      letter-spacing:1px;
    }

    .section-box{
      background:#101010;
      border:1px solid #2b2b2b;
      border-radius:12px;
      padding:20px;
      margin-bottom:25px;
    }

    .section-box input,
    .section-box textarea{
      width:100%;
      margin-top:10px;
      padding:10px;
      border-radius:8px;
      border:1px solid #333;
      background:#000;
      color:#fff;
    }

    .section-box button{
      margin-top:15px;
      width:100%;
      padding:12px;
      background:linear-gradient(90deg,#ff9b3b,#ff6a00);
      border:none;
      border-radius:8px;
      font-weight:700;
      cursor:pointer;
      color:#050505;
    }

    .preview{
      margin-top:25px;
      background:#0d0d0d;
      border:1px solid #2b2b2b;
      border-radius:12px;
      padding:20px;
      text-align:center;
    }

    .preview img{
      width:180px;
      margin-bottom:15px;
      border-radius:12px;
      border:1px solid #ff9b3b55;
    }

    .preview h3{
      font-size:20px;
      color:#ff9b3b;
      text-transform:uppercase;
      letter-spacing:2px;
    }

    .preview p{
      margin-top:8px;
      color:#ccc;
      font-size:13px;
    }

    footer{
      padding:15px;
      text-align:center;
      font-size:12px;
      color:#777;
      border-top:1px solid #2b2b2b;
      background:#0a0a0a;
    }
  </style>

  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="branding-pro-max.js"></script>
</head>

<body>

  <header>
    <h1>BRANDING PRO‑MAX</h1>
    <span id="roleChip">...</span>
  </header>

  <main>

    <h2>Logo & Idantite Viziyèl PRO‑MAX</h2>

    <div class="section-box">
      <input id="brandName" type="text" placeholder="Non ofisyèl (egzanp: BSS1815)">
      <textarea id="brandSlogan" placeholder="Slogan / fraz idantite"></textarea>
      <input id="brandLogo" type="file" accept="image/*">
      <button id="saveBrandBtn">Mete ajou Branding PRO‑MAX</button>
    </div>

    <h2>Aperçu PRO‑MAX</h2>

    <div class="preview">
      <img id="previewLogo" src="default-logo.png" alt="BRANDING LOGO">
      <h3 id="previewName">BSS1815</h3>
      <p id="previewSlogan">Slogan BSS1815 ap parèt isit la…</p>
    </div>

  </main>

  <footer>
    © 2026 BSS1815 — Branding PRO‑MAX.
  </footer>

</body>
</html>
