<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Ti Machann – BSS1815</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom, #ffa64d, #000);
      font-family: Arial, sans-serif;
      color: #ffa64d;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
      font-size: 38px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .stats-container {
      width: 90%;
      max-width: 900px;
      margin: 30px auto;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .stat-box {
      background: #000;
      padding: 25px;
      border-radius: 10px;
      border: 2px solid #ffa64d;
      font-size: 22px;
      font-weight: bold;
    }

    .btn {
      width: 80%;
      max-width: 350px;
      padding: 18px;
      margin: 30px auto;
      background: #ffa64d;
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 22px;
      cursor: pointer;
      transition: 0.3s;
      text-transform: uppercase;
      font-weight: bold;
    }

    .btn:hover {
      transform: scale(1.05);
      background: #ffb76b;
    }
  </style>
</head>

<body>

  <h1>Dashboard Ti Machann</h1>

  <div class="stats-container">

    <div class="stat-box">
      Total Ti Machann<br>
      <span id="totalVendors">0</span>
    </div>

    <div class="stat-box">
      Ki Peye<br>
      <span id="paidVendors">0</span>
    </div>

    <div class="stat-box">
      Ki Poko Peye<br>
      <span id="unpaidVendors">0</span>
    </div>

    <div class="stat-box">
      Total Lajan Rantre<br>
      $<span id="totalMoney">0</span>
    </div>

  </div>

  <button class="btn" onclick="window.location.href='ajoute-ti-machann.html'">
    Ajoute Ti Machann
  </button>

  <button class="btn" onclick="window.location.href='ti-machann-list.html'">
    Lis Ti Machann yo
  </button>

</body>
</html>
