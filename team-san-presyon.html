<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <title>TEAM SAN PRESYON — GALRI OFISYÈL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --sp-orange: #ff8a00;
      --sp-black: #050505;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--sp-black);
      color: #ffffff;
    }

    #team-san-presyon {
      min-height: 100vh;
      background: var(--sp-black);
      padding: 40px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    #team-san-presyon h1 {
      color: var(--sp-orange);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 2px solid var(--sp-orange);
      padding-bottom: 12px;
      margin-bottom: 30px;
      font-size: 1.8rem;
    }

    .sp-block-title {
      color: var(--sp-orange);
      font-weight: 700;
      text-transform: uppercase;
      margin: 25px 0 12px;
      letter-spacing: 0.06em;
      font-size: 0.95rem;
    }

    .sp-grid-photos,
    .sp-grid-videos {
      display: grid;
      gap: 10px;
    }

    @media (min-width: 768px) {
      .sp-grid-photos {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
      .sp-grid-videos {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 767px) {
      .sp-grid-photos {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .sp-grid-videos {
        grid-template-columns: repeat(1, minmax(0, 1fr));
      }
    }

    .sp-photo {
      border: 1px solid var(--sp-orange);
      background: #000000;
      overflow: hidden;
    }

    .sp-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .sp-photo:hover img {
      transform: scale(1.03);
      box-shadow: 0 0 18px rgba(255, 138, 0, 0.7);
    }

    .sp-video-card {
      border: 1px solid var(--sp-orange);
      background: #000000;
      text-decoration: none;
      color: #ffffff;
      display: flex;
      flex-direction: column;
    }

    .sp-video-thumb {
      position: relative;
      padding-top: 56.25%;
      background: radial-gradient(circle at center, #222222 0, #000000 60%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sp-play {
      position: absolute;
      font-size: 2.5rem;
      color: var(--sp-orange);
      text-shadow: 0 0 12px rgba(255, 138, 0, 0.9);
    }

    .sp-video-label {
      padding: 10px;
      border-top: 1px solid var(--sp-orange);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 0.85rem;
    }

    .sp-video-card:hover .sp-video-thumb {
      box-shadow: 0 0 18px rgba(255, 138, 0, 0.7);
    }
  </style>
</head>
<body>
  <section id="team-san-presyon">
    <h1>Galri Ofisyèl San Presyon</h1>

    <div class="sp-block-title">Galri Foto</div>
    <div class="sp-grid-photos">
      <!-- Ranplase chemen yo ak foto reyèl ou yo -->
      <div class="sp-photo">
        <img src="/assets/san-presyon/photo-1.jpg" alt="San Presyon Photo 1">
      </div>
      <div class="sp-photo">
        <img src="/assets/san-presyon/photo-2.jpg" alt="San Presyon Photo 2">
      </div>
      <div class="sp-photo">
        <img src="/assets/san-presyon/photo-3.jpg" alt="San Presyon Photo 3">
      </div>
      <div class="sp-photo">
        <img src="/assets/san-presyon/photo-4.jpg" alt="San Presyon Photo 4">
      </div>
    </div>

    <div class="sp-block-title">Galri Videyo</div>
    <div class="sp-grid-videos">
      <!-- Ranplase href ak lyen videyo reyèl yo -->
      <a class="sp-video-card" href="https://youtube.com/..." target="_blank" rel="noopener">
        <div class="sp-video-thumb">
          <span class="sp-play">▶</span>
        </div>
        <div class="sp-video-label">Koregrafi San Presyon</div>
      </a>

      <a class="sp-video-card" href="https://youtube.com/..." target="_blank" rel="noopener">
        <div class="sp-video-thumb">
          <span class="sp-play">▶</span>
        </div>
        <div class="sp-video-label">Evènman Ofisyèl</div>
      </a>

      <a class="sp-video-card" href="https://youtube.com/..." target="_blank" rel="noopener">
        <div class="sp-video-thumb">
          <span class="sp-play">▶</span>
        </div>
        <div class="sp-video-label">Mouvman Espesyal</div>
      </a>
    </div>
  </section>
</body>
</html>
