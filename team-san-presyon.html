<style>
.sanpresyon-slideshow-container {
  width: 100%;
  max-width: 100%;
  height: 480px;
  position: relative;
  overflow: hidden;
  background: #000000;
  border: 4px solid #FF8A00;
}

.sanpresyon-slide {
  display: none;
  width: 100%;
  height: 100%;
}

.sanpresyon-slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.fade {
  animation-name: fadeEffect;
  animation-duration: 1.2s;
}

@keyframes fadeEffect {
  from { opacity: 0.3; }
  to { opacity: 1; }
}
</style>

<script>
let sanIndex = 0;
sanpresyonShowSlides();

function sanpresyonShowSlides() {
  let i;
  let slides = document.getElementsByClassName("sanpresyon-slide");
  for (i = 0; i < slides.length; i++) {
    slides[i].style.display = "none";
  }
  sanIndex++;
  if (sanIndex > slides.length) { sanIndex = 1; }
  slides[sanIndex - 1].style.display = "block";
  setTimeout(sanpresyonShowSlides, 3000);
}
</script>
