  <!-- CSS + ANIMASYON YO ANSANM -->
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom, #ffa64d, #000);
      color: #ffa64d;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow-x: hidden;
    }

    .header-area {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 40px;
    }

    /* LOGO GAUCHE — ROTATE IN */
    .logo {
      width: 140px;
      opacity: 0;
      transform: rotate(-180deg) scale(0.3);
      animation: spinIn 1.6s ease-out forwards;
    }

    @keyframes spinIn {
      0% {
        opacity: 0;
        transform: rotate(-180deg) scale(0.3);
      }
      70% {
        opacity: 1;
        transform: rotate(10deg) scale(1.1);
      }
      100% {
        transform: rotate(0deg) scale(1);
      }
    }

    /* KOUKOU DWAT — FLY IN */
    .koukou {
      width: 140px;
      opacity: 0;
      transform: translateX(200px) translateY(-40px);
      animation: flyIn 1.8s ease-out forwards;
      animation-delay: 0.3s;
    }

    @keyframes flyIn {
      0% {
        opacity: 0;
        transform: translateX(200px) translateY(-40px);
      }
      60% {
        opacity: 1;
        transform: translateX(-20px) translateY(0px);
      }
      100% {
        transform: translateX(0px);
      }
    }
