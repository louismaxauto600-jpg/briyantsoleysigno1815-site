<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BSS1815 – RARA</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #000000;
      color: #FF7A00;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    /* NAVIGATION */
    .bss-nav {
      width: 100%;
      background: #000000;
      border-bottom: 2px solid #FF7A00;
      padding: 12px 0;
      display: flex;
      justify-content: center;
      gap: 26px;
      position: sticky;
      top: 0;
      z-index: 999;
    }

    .bss-nav a {
      color: #FF7A00;
      text-decoration: none;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 15px;
      transition: 0.2s ease;
    }

    .bss-nav a:hover {
      color: #000000;
      background: #FF7A00;
      padding: 6px 12px;
      border-radius: 6px;
      box-shadow: 0 0 14px #FF7A00;
    }

    /* HEADER */
    .bss-header {
      width: 100%;
      padding: 16px 24px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      background: linear-gradient(to right, #000000, #FF7A00, #000000);
      border-bottom: 2px solid #FF7A00;
    }

    /* LOGO TOU WON */
    .bss-logo-wrap {
      width: 240px;
      height: 240px;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid #000000;
      box-shadow: 0 0 18px #FF7A00;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000000;
      animation: logoRotateIn 1.2s ease-out forwards;
    }

    .bss-left-logo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      animation: logoSpin 4s linear infinite;
    }

    /* TIT */
    .bss-title {
      flex: 1;
      text-align: center;
      font-size: 32px;
      font-weight: 900;
      color: #000000;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 6px rgba(255,122,0,0.6);
      padding: 0 10px;
    }

    /* KOUKOU ANIME */
    @keyframes koukouSequence {
      0% { transform: translateX(-160px); opacity: 0; }
      20% { transform: translateX(0); opacity: 1; }
      60% { transform: translateX(0); opacity: 1; }
      100% { transform: translateX(180px); opacity: 0; }
    }

    .bss-right-koukou {
      width: 200px;
      height: auto;
      margin-bottom: 6px;
      animation: koukouSequence 4.5s ease-out forwards;
    }

    /* ANIMASYON LOGO */
    @keyframes logoRotateIn {
      0% { transform: scale(0.3); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes logoSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* SEKSYON */
    .section {
      padding: 40px 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    .section h2 {
      color: #FF7A00;
      text-transform: uppercase;
      font-size: 26px;
      margin-bottom: 14px;
    }

    /* UPLOAD ZONE */
    .upload-box {
      background: #111111;
      border: 2px dashed #FF7A00;
      padding: 30px;
      border-radius: 10px;
      margin-top: 20px;
      box-shadow: 0 0 14px #FF7A00;
    }

    .upload-box input {
      margin-top: 14px;
      padding: 10px;
      background: #000000;
      border: 2px solid #FF7A00;
      color: #FF7A00;
      border-radius: 6px;
      width: 80%;
    }

    .upload-btn {
      margin-top: 16px;
      background: #FF7A00;
      color: #000000;
      padding: 12px 22px;
      border-radius: 6px;
      font-weight: bold;
      border: 2px solid #000000;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .upload-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 18px #FF7A00;
    }

    /* LIST MIZIK YO */
    .music-list {
      margin-top: 30px;
      text-align: left;
      color: #FF7A00;
    }

    .music-item {
      background: #111111;
      padding: 14px;
      border: 1px solid #FF7A00;
      border-radius: 6px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .delete-btn {
      background: #FF7A00;
      color: #000000;
      padding: 6px 12px;
      border-radius: 6px;
      font-weight: bold;
      border: 2px solid #000000;
      cursor: pointer;
      display: none; /* ADMIN ONLY */
    }

    /* BOUTON RETOU */
    .btn {
      background: #FF7A00;
      color: #000000;
      padding: 14px 26px;
      border-radius: 6px;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
      margin-top: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: 2px solid #000000;
      box-shadow: 0 0 10px #FF7A00;
      transition: 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 18px #FF7A00;
    }
  </style>
</head>

<body>

  <!-- NAVIGATION -->
  <nav class="bss-nav">
    <a href="index.html">Akèy</a>
    <a href="admin.html">Admin</a>
    <a href="kiyesnouye.html">Kiyès nou ye</a>
    <a href="mizik.html">Mizik</a>
    <a href="upload.html">Upload</a>
    <a href="security_logs.html">Sekirite</a>
    <a href="transactions.html">Transaksyon</a>
  </nav>

  <!-- HEADER -->
  <header class="bss-header">
    <div class="bss-logo-wrap">
      <img src="nouvo-logo-bss-3.jpeg" class="bss-left-logo" alt="BSS1815 Logo">
    </div>

    <h1 class="bss-title">RARA</h1>

    <img src="koukou4.jpeg" class="bss-right-koukou" alt="Koukou BSS1815">
  </header>

  <!-- SEKSYON UPLOAD -->
  <div class="section">
    <h2>Upload Mizik RARA</h2>

    <div class="upload-box">
      <p>Fanatik yo ka upload mizik RARA yo la.</p>

      <input type="file" id="musicFile" accept="audio/*">
      <button class="upload-btn">Upload</button>
    </div>

    <div class="music-list">
      <h3>Mizik ki deja upload:</h3>

      <!-- Egzanp mizik (Firebase ap ranplase sa) -->
      <div class="music-item">
        <span>rara_sample_1.mp3</span>
        <button class="delete-btn">Efase</button>
      </div>

      <div class="music-item">
        <span>rara_sample_2.mp3</span>
        <button class="delete-btn">Efase</button>
      </div>
    </div>

    <a href="mizik.html" class="btn">Retounen nan Mizik</a>
  </div>

</body>
</html>
