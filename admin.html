<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSS1815 — ADMIN PRO‑MAX</title>

    <style>
        :root {
            --abriko: #FF7A00;
            --nwa: #000000;
            --nwa-soft: #1A1A1A;
            --blan: #FFFFFF;
        }

        body {
            margin: 0;
            background: var(--nwa);
            color: var(--blan);
            font-family: Arial, sans-serif;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            height: 100vh;
            background: var(--nwa);
            border-right: 2px solid var(--abriko);
            position: fixed;
            top: 0;
            left: 0;
            padding-top: 20px;
            box-shadow: 0 0 20px var(--abriko);
        }

        .sidebar-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar .logo {
            width: 180px;
            filter: drop-shadow(0 0 10px var(--abriko));
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 0 20px;
        }

        .menu-btn {
            background: var(--nwa-soft);
            color: var(--blan);
            border: 1px solid var(--abriko);
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            text-align: left;
            transition: 0.3s;
        }

        .menu-btn:hover,
        .menu-btn.active {
            background: var(--abriko);
            color: var(--nwa);
        }

        .logout {
            margin-top: 40px;
            background: #700000;
            border-color: red;
        }

        /* MAIN CONTENT */
        .main-content {
            margin-left: 260px;
            padding: 40px;
        }

        .page-title {
            font-size: 32px;
            color: var(--abriko);
            margin-bottom: 20px;
        }

        .page-section {
            background: var(--nwa-soft);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid var(--abriko);
            box-shadow: 0 0 20px var(--abriko);
        }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <img src="/PATH/logo-bss2.jpeg" class="logo">
        </div>

        <nav class="sidebar-menu">
            <button class="menu-btn active">🏠 Dashboard</button>
            <button class="menu-btn">🖼️ Flyer Center</button>
            <button class="menu-btn">📄 Letter Center</button>
            <button class="menu-btn">🎵 Musician Center</button>
            <button class="menu-btn">📤 Upload Photo</button>
            <button class="menu-btn">👤 Kont Admin</button>
            <button class="menu-btn logout" onclick="logoutAdmin()">🚪 Logout</button>
        </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <h1 class="page-title">ADMIN PANEL — BSS1815</h1>

        <div class="page-section">
            <p>Byenveni nan Dashboard PRO‑MAX la. Ou konekte kòm ADMIN.</p>
        </div>
    </main>

    <!-- SEKIRITE -->
    <script>
        if (!localStorage.getItem("bss_admin_logged")) {
            window.location.href = "login.html";
        }

        function logoutAdmin() {
            localStorage.removeItem("bss_admin_logged");
            window.location.href = "login.html";
        }
    </script>

</body>
</html>
