<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BSS1815 • ADMIN PANEL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    body{
      background:#000;
      color:#ff7a00;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:20px;
    }

    .header{
      width:100%;
      max-width:1100px;
      padding:15px;
      border:2px solid #ff7a00;
      border-radius:12px;
      background:rgba(0,0,0,0.85);
      box-shadow:0 0 25px #ff7a00;
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .logo{
      font-size:22px;
      font-weight:900;
      background:linear-gradient(135deg,#ff7a00,#000);
      padding:12px 18px;
      border-radius:10px;
      box-shadow:0 0 20px #ff7a00;
    }

    .role{
      padding:6px 12px;
      border-radius:999px;
      border:2px solid #ff7a00;
      font-size:12px;
      font-weight:800;
      text-transform:uppercase;
      box-shadow:0 0 15px #ff7a00;
    }

    .container{
      width:100%;
      max-width:1100px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }

    @media(max-width:900px){
      .container{
        grid-template-columns:1fr;
      }
    }

    .section{
      background:rgba(0,0,0,0.85);
      border:2px solid #ff7a00;
      border-radius:12px;
      padding:16px;
      box-shadow:0 0 25px #ff7a00;
    }

    .section h2{
      font-size:20px;
      margin-bottom:12px;
      text-shadow:0 0 10px #ff7a00;
    }

    .btn{
      border:none;
      cursor:pointer;
      font-weight:800;
      text-transform:uppercase;
      border-radius:8px;
      padding:10px 14px;
      font-size:12px;
      letter-spacing:0.5px;
      transition:0.18s ease;
      margin-bottom:10px;
    }

    .btn-primary{
      background:#000;
      color:#ff7a00;
      border:2px solid #ff7a00;
      box-shadow:0 0 15px #ff7a00;
    }

    .btn-primary:hover{
      background:#ff7a00;
      color:#000;
      box-shadow:0 0 25px #ff7a00;
      transform:translateY(-1px);
    }

    .list{
      display:flex;
      flex-direction:column;
      gap:10px;
      max-height:250px;
      overflow-y:auto;
      padding-right:6px;
    }

    .item{
      background:rgba(255,122,0,0.08);
      border-left:3px solid #ff7a00;
      padding:10px;
      border-radius:6px;
      box-shadow:0 0 10px #ff7a00;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:12px;
    }

    .remove{
      background:#ff0000;
      color:#fff;
      border:none;
      padding:6px 10px;
      border-radius:6px;
      cursor:pointer;
      font-weight:800;
      box-shadow:0 0 10px #ff0000;
    }

    .remove:hover{
      background:#ff7a00;
      color:#000;
      box-shadow:0 0 20px #ff7a00;
    }

    .modal-backdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.9);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:50;
    }

    .modal{
      width:90%;
      max-width:350px;
      background:#000;
      border:2px solid #ff7a00;
      border-radius:12px;
      padding:16px;
      box-shadow:0 0 25px #ff7a00;
    }

    .modal h3{
      margin-bottom:10px;
      text-shadow:0 0 10px #ff7a00;
    }

    .input{
      width:100%;
      background:#000;
      border:1px solid #ff7a00;
      border-radius:8px;
      padding:8px 10px;
      color:#ff7a00;
      margin-bottom:10px;
    }

    .modal-actions{
      display:flex;
      justify-content:flex-end;
      gap:10px;
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="logo">ADMIN</div>
    <div class="role">ADMIN PANEL • BSS1815</div>
  </div>

  <div class="container">

    <!-- ADMIN MANAGEMENT -->
    <div class="section">
      <h2>👥 ADMIN MANAGEMENT</h2>

      <button class="btn btn-primary" onclick="openModal()">➕ Add Admin</button>

      <div class="list" id="adminList">
        <!-- Dynamic admins -->
      </div>
    </div>

    <!-- SECURITY LOGS -->
    <div class="section">
      <h2>🛡 SECURITY LOGS</h2>

      <div class="list" id="logsList">
        <!-- Dynamic logs -->
