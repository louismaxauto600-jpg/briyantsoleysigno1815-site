<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSS1815 — ADMIN PRO‑MAX</title>

    <style>
        /* ============================
           PALET KOULÈ OFISYÈL BSS1815
           ============================ */
        :root {
            --abriko: #FF7A00;
            --jòn: #FFD400;
            --nwa: #000000;
            --nwa-soft: #1A1A1A;
            --blan: #FFFFFF;
        }

        body {
            margin: 0;
            background: var(--nwa);
            color: var(--blan);
            font-family: Arial, sans-serif;
        }

        /* ============================
           HEADER + LOGO PRO‑MAX
           ============================ */
        .bss-header {
            background: var(--nwa);
            padding: 15px 30px;
            border-bottom: 2px solid var(--abriko);
        }

        .bss-header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .bss-logo {
            width: 220px;
            height: auto;
            filter: drop-shadow(0 0 10px var(--abriko));
        }

        /* ============================
           ADMIN PANEL STYLE
           ============================ */
        .admin-container {
            max-width: 900px;
            margin: 50px auto;
            background: var(--nwa-soft);
            padding: 30px;
            border-radius: 10px;
            border: 2px solid var(--abriko);
            box-shadow: 0 0 20px var(--abriko);
        }

        h1 {
            text-align: center;
            color: var(--abriko);
            margin-bottom: 20px;
        }

        .admin-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            background: var(--abriko);
            color: var(--blan);
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .admin-btn:hover {
            background: var(--jòn);
            color: var(--nwa);
        }
    </style>
</head>

<body>

    <!-- HEADER + LOGO -->
    <header class="bss-header">
        <div class="bss-header-inner">
            <img src="/PATH/logo-bss2.jpeg" class="bss-logo">
        </div>
    </header>

    <!-- ADMIN PANEL -->
    <div class="admin-container">
        <h1>ADMIN PANEL — BSS1815</h1>

        <button class="admin-btn">📌 Jere Mizisyen yo</button>
        <button class="admin-btn">📌 Jere Lèt yo</button>
        <button class="admin-btn">📌 Upload Foto</button>
        <button class="admin-btn">📌 Jere Kont yo</button>
        <button class="admin-btn">📌 Logout</button>
    </div>

</body>
</html>
