<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BSS 1815 — ADMIN PANEL</title>

  <style>
    body {
      background: linear-gradient(180deg, #000000, #0a0a0a, #1b1208);
      color: white;
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    /* TOPBAR */
    .topbar {
      background: #000;
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 3px solid #ff8c00;
      box-shadow: 0 0 15px rgba(255, 140, 0, 0.4);
    }

    .brand {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 1px;
      color: #ff8c00;
      text-shadow: 0 0 10px rgba(255, 140, 0, 0.6);
    }

    .hidden {
      display: none;
    }

    /* MAIN CONTAINER */
    .container {
      padding: 25px;
      max-width: 650px;
      margin: auto;
    }

    h2 {
      color: #ff8c00;
      text-align: center;
      margin-bottom: 20px;
      text-shadow: 0 0 8px rgba(255, 140, 0, 0.5);
    }

    /* INPUTS */
    input {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #0d0d0d;
      color: white;
      font-size: 16px;
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      border-color: #ff8c00;
      box-shadow: 0 0 8px rgba(255, 140, 0, 0.5);
    }

    /* BUTTONS */
    button {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      border-radius: 6px;
      border: none;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      background: #ff8c00;
      color: black;
      transition: 0.2s;
    }

    button:hover {
      background: #ffa733;
      box-shadow: 0 0 12px rgba(255, 140, 0, 0.7);
    }

    /* MUSICIAN CARDS */
    .card {
      background: #0d0d0d;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
      text-align: center;
      border: 1px solid #ff8c00;
      box-shadow: 0 0 10px rgba(255, 140, 0, 0.3);
    }

    .card img {
      border-radius: 8px;
      width: 100%;
      margin-bottom: 10px;
    }

    .card h3 {
      margin: 5px 0;
      color: #ff8c00;
    }

    .card p {
      margin: 0;
      color: #ccc;
    }

    .card button {
      margin-top: 12px;
      background: #b30000;
      color: white;
    }

    .card button:hover {
      background: #ff0000;
      box-shadow: 0 0 10px rgba(255, 0, 0, 0.6);
    }
  </style>
</head>
<script type="module" src="firebase.js"></script>
<script type="module" src="admin.js"></script>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="brand">BSS 1815 — ADMIN</div>
    <button id="logoutBtn" class="hidden" onclick="logoutAdmin()">Logout</button>
  </div>

  <!-- LOGIN SECTION -->
  <div id="loginSection" class="container">
    <h2>Admin Login</h2>
    <input id="adminEmail" type="email" placeholder="Imel admin">
    <input id="adminPassword" type="password" placeholder="Modpas admin">
    <button onclick="loginAdmin()">Login</button>
  </div>

  <!-- ADMIN SECTION -->
  <div id="adminSection" class="container hidden">
    <h2>Ajoute Mizisyen</h2>

    <input id="musicianName" type="text" placeholder="Non mizisyen">
    <input id="musicianRole" type="text" placeholder="Wòl mizisyen">
    <input id="musicianPhoto" type="file" accept="image/*">

    <button onclick="addMusician()">Ajoute</button>

    <h2 style="margin-top:40px;">Lis Mizisyen yo</h2>
    <div id="musicianList"></div>
  </div>

  <!-- SCRIPTS -->
  <script type="module" src="firebase.js"></script>
  <script type="module" src="admin.js"></script>

</body>
</html>
