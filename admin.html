<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<title>ADMIN PANEL</title>

<style>
body {
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box {
    border:2px solid #FF7A00;
    padding:30px;
    text-align:center;
}

button {
    display:block;
    margin:10px auto;
    padding:10px;
    width:200px;
    background:#FF7A00;
    border:none;
}
</style>
</head>

<body>

<div class="box">
    <h2>ADMIN PANEL</h2>

    <button onclick="goSuper()">GO SUPER ADMIN</button>
    <button onclick="logout()">LOGOUT</button>
</div>

<script>
function goSuper(){
    window.location.href="super_admin.html";
}

function logout(){
    localStorage.removeItem("bss_admin_logged");
    window.location.href="login.html";
}
</script>

</body>
</html>
