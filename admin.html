<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSS1815 Leaders Control Panel</title>

    <!-- STYLE FILE -->
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="hero">
        <h1>LEADERS CONTROL PANEL</h1>
        <p>Seksyon prive pou SUPER ADMIN & ADMIN</p>
    </header>

    <!-- ADMIN UPLOAD SECTION -->
    <section class="section">
        <h2>Upload Medya Ofisyèl</h2>

        <form id="adminUploadForm">

            <!-- CATEGORY SELECT -->
            <label for="mediaCategory">Chwazi Kategori:</label>
            <select id="mediaCategory" required>
                <option value="">— Chwazi —</option>
                <option value="store">Store (Pwodwi)</option>
                <option value="event">Evènman</option>
                <option value="leadership">Leadership</option>
                <option value="fanclub">Fanclub</option>
                <option value="banner">Bannè</option>
                <option value="product">Foto Pwodwi</option>
            </select>

            <p id="categoryInfo" style="margin-top:10px; opacity:0.8;"></p>

            <!-- DESCRIPTION -->
            <textarea id="mediaDescription" placeholder="Deskripsyon medya a (opsyonèl)"></textarea>

            <!-- FILE INPUT -->
            <input type="file" id="adminFile" accept="image/*,video/*" required>

            <!-- PREVIEW -->
            <div id="previewBox" style="margin-top:15px;"></div>

            <!-- SUBMIT BUTTON -->
            <button type="submit" class="btn">Upload</button>
        </form>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2026 BSS1815 — Leaders Panel</p>
    </footer>

    <!-- SCRIPT FILE -->
    <script src="scripts/admin.js"></script>

</body>
</html>
