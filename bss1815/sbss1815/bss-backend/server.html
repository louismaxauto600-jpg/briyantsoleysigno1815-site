<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <title>BSS1815 WhatsApp PRO‑MAX</title>
</head>
<body>

  <h1>BSS1815 WhatsApp Sender</h1>

  <textarea id="msg" placeholder="Ekri mesaj ou la..." rows="5" cols="40"></textarea>
  <br><br>

  <button onclick="sendMessage()">VOYE MESAJ</button>

  <script>
    function sendMessage() {
      const message = document.getElementById("msg").value;

      fetch("http://localhost:3000/send", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message })
      })
      .then(res => res.json())
      .then(data => {
        alert("Status: " + data.status);
      });
    }
  </script>

</body>
</html>
