<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <title>BSS 1815 – Admin Panel 2 (NETWAYE)</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <header class="bss-header">
    <div class="bss-logo-wrap">
      <img src="nouvo-logo-bss-3.jpeg" class="bss-left-logo" alt="BSS1815 Logo">
    </div>

    <h1 class="bss-title">Admin Panel</h1>

    <img src="koukou-mekontan.jpeg" class="bss-right-koukou" alt="Koukou BSS1815">
  </header>

  <!-- SLOGAN -->
  <div class="bss-slogan">Nou soti lwen, nou kanpe wo.</div>

  <!-- SEARCH -->
  <div style="max-width:1100px; margin:auto; padding:20px;">
    <input type="text" id="search-input" placeholder="Chèche mizisyen…" style="width:100%; padding:10px; border-radius:6px; border:none;">
  </div>

  <!-- FILTERS -->
  <div style="text-align:center; margin-bottom:20px;">
    <button class="filter-btn" data-section="ALL">Tout</button>
    <button class="filter-btn" data-section="CHANTE">Chante</button>
    <button class="filter-btn" data-section="TAMBOUR">Tanbou</button>
    <button class="filter-btn" data-section="GITAR">Gitar</button>
    <button class="filter-btn" data-section="PIANO">Piano</button>
  </div>

  <!-- TABLE -->
  <div style="max-width:1100px; margin:auto;">
    <table id="musicians-table" style="width:100%; border-collapse:collapse;">
      <thead>
        <tr>
          <th>Non</th>
          <th>Seksyon</th>
          <th>Enstriman</th>
          <th>Kontra</th>
          <th>Peye</th>
          <th>Balans</th>
          <th>Foto</th>
          <th>Aksyon</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <p id="total-contracts"></p>
    <p id="total-paid"></p>
    <p id="total-balance"></p>
  </div>

  <hr style="margin:40px auto; width:80%; border-color:#FF7A00;">

  <!-- FORM -->
  <div style="max-width:1100px; margin:auto;">
    <h2 style="color:#FF7A00;">Ajoute / Modifye Mizisyen</h2>

    <form id="musician-form">
      <input type="text" name="id" placeholder="ID (san espas)">
      <input type="text" name="name" placeholder="Non mizisyen an">
      <input type="text" name="instrument" placeholder="Enstriman">

      <select name="section">
        <option value="">Chwazi Seksyon</option>
        <option value="CHANTE">Chante</option>
        <option value="TAMBOUR">Tanbou</option>
        <option value="GITAR">Gitar</option>
        <option value="PIANO">Piano</option>
      </select>

      <input type="number" name="contract" placeholder="Kontra (Gdes)">
      <input type="number" name="paid" placeholder="Peye (Gdes)">
      <input type="number" name="balance" placeholder="Balans (Gdes)">
      <input type="text" name="season" placeholder="Sezon (ex: 2026)">
      <input type="text" name="photoUrl" placeholder="URL foto (otomatik si ou upload)">

      <label style="color:#FF7A00;">Upload Foto:</label>
      <input type="file" id="photo-file" accept="image/*">

      <button type="submit">SOVE</button>
      <button type="button" id="reset-form">REYAJISTE</button>
    </form>
  </div>

  <!-- SCRIPT -->
  <script type="module" src="admin-dashboard-final.js"></script>

</body>
</html>
